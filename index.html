<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Control Vehicular PRODENI</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --verde-deep:  #1B5E20;
      --verde-corp:  #2E7D32;
      --verde-light: #4CAF50;
      --amarillo:    #F9A825;
      --tierra:      #5D4037;
      --error:       #C62828;
      --bg:          #0F3A12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #4CAF50, transparent);
      top: -200px; right: -200px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #F9A825, transparent);
      bottom: -100px; left: -100px;
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.1); }
    }
    .card {
      background: white;
      border-radius: 28px;
      width: 90%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      position: relative;
      z-index: 10;
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-logo {
      width: 100px;
      height: auto;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 12px rgba(46,125,50,0.3));
    }
    .brand-slogan {
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--verde-corp);
      font-style: italic;
      letter-spacing: 1.5px;
    }
    .form-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.2rem;
      text-align: center;
    }
    .field {
      position: relative;
      margin-bottom: 14px;
    }
    .field i.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      padding: 14px 14px 14px 40px;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      background: #fafafa;
      transition: all 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--verde-corp);
      background: #fff;
    }
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
    }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--verde-corp), var(--verde-deep));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.15s;
      box-shadow: 0 8px 20px rgba(46,125,50,0.35);
    }
    .btn-login:hover { transform: translateY(-2px); }
    .btn-login.loading { opacity: 0.8; pointer-events: none; }
    .btn-login .spinner { display: none; }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spin-custom { animation: spin 0.8s linear infinite; }
    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 0.82rem;
      color: var(--error);
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-box.show { display: flex; }
    .offline-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #FFF8E1;
      border: 1.5px solid #F9A825;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #856404;
      margin-bottom: 14px;
    }
    .offline-badge.show { display: flex; }
    .version {
      text-align: center;
      font-size: 0.68rem;
      color: #ccc;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-logo" style="font-size: 2rem; font-weight: 800; color: var(--verde-corp);">PRODENI</div>
    <span class="brand-slogan">Control Vehicular · Flota Sustentable</span>
  </div>
  <div class="offline-badge" id="offlineBadge">
    <i class="fas fa-wifi-slash"></i> Modo sin conexión
  </div>
  <p class="form-title">Acceso al sistema</p>
  <div class="field">
    <i class="fas fa-user icon"></i>
    <input type="text" id="inputUser" placeholder="Usuario" autocomplete="username">
  </div>
  <div class="field">
    <i class="fas fa-lock icon"></i>
    <input type="password" id="inputPass" placeholder="Contraseña" autocomplete="current-password">
    <button type="button" class="toggle-pass" onclick="togglePass()">
      <i class="fas fa-eye" id="eyeIcon"></i>
    </button>
  </div>
  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btn-text"><i class="fas fa-truck"></i> INGRESAR</span>
    <span class="spinner"><i class="fas fa-leaf fa-spin-custom"></i> Verificando...</span>
  </button>
  <div class="error-box" id="errorBox">
    <i class="fas fa-exclamation-circle"></i>
    <span id="errorMsg">Error</span>
  </div>
  <p class="version">PRODENI Fleet v1.0</p>
</div>

<script>
// ============================================================
// CONFIGURACIÓN ÚNICA: TU URL DE APPS SCRIPT
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVdwSxXOZ7Q3jeNGf1aWoAhlYaTCyz1FXjrrpAGGU6bV1OappWIuymBXjghuJmaN4V/exec';

// Guardar URL para que otros módulos la usen
localStorage.setItem('prodeni_script_url', SCRIPT_URL);

// ============================================================
// GESTOR DE SESIÓN
// ============================================================
const SessionManager = {
  KEY: 'prodeni_session',
  
  set(userData) {
    const session = {
      username: userData.username,
      role: userData.role || 'tecnico',
      email: userData.email || '',
      expiresAt: new Date().setHours(23, 59, 59, 999)
    };
    localStorage.setItem(this.KEY, JSON.stringify(session));
  },
  
  get() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (s.expiresAt && Date.now() > s.expiresAt) {
        localStorage.removeItem(this.KEY);
        return null;
      }
      return s;
    } catch(e) { return null; }
  },
  
  logout() {
    localStorage.removeItem(this.KEY);
    window.location.href = 'index.html';
  },
  
  require() {
    const s = this.get();
    if (!s) window.location.href = 'index.html';
    return s;
  }
};

// ============================================================
// CREDENCIALES OFFLINE
// ============================================================
function hashCreds(user, pass) {
  return btoa(unescape(encodeURIComponent(user + '::' + pass + '::prodeni')));
}

function saveOfflineCreds(username, password, role) {
  localStorage.setItem('prodeni_creds', JSON.stringify({
    h: hashCreds(username, password),
    u: username,
    r: role,
    t: Date.now()
  }));
}

function checkOfflineCreds(username, password) {
  try {
    const c = JSON.parse(localStorage.getItem('prodeni_creds') || 'null');
    if (!c) return null;
    const today = new Date();
    const savedDate = new Date(c.t);
    if (savedDate.toDateString() !== today.toDateString()) return null;
    if (c.h !== hashCreds(username, password)) return null;
    return { username: c.u, role: c.r };
  } catch(e) { return null; }
}

function invalidateOfflineCreds() {
  localStorage.removeItem('prodeni_creds');
}

// ============================================================
// LOGIN
// ============================================================
async function doLogin() {
  const user = document.getElementById('inputUser').value.trim();
  const pass = document.getElementById('inputPass').value.trim();
  if (!user || !pass) {
    showError('Ingresa usuario y contraseña');
    return;
  }
  
  hideError();
  const btn = document.getElementById('btnLogin');
  btn.classList.add('loading');
  
  if (navigator.onLine) {
    try {
      const url = `${SCRIPT_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json();
      
      if (data.valid && data.user) {
        const userData = { username: data.user.username, role: data.user.role || 'tecnico', email: data.user.email || '' };
        SessionManager.set(userData);
        saveOfflineCreds(user, pass, userData.role);
        window.location.href = userData.role === 'admin' ? 'admin.html' : 'tecnico.html';
        return;
      } else {
        invalidateOfflineCreds();
        showError(data.message || 'Credenciales incorrectas');
      }
    } catch(e) {
      tryOfflineLogin(user, pass);
    }
  } else {
    tryOfflineLogin(user, pass);
  }
  
  btn.classList.remove('loading');
}

function tryOfflineLogin(user, pass) {
  const cached = checkOfflineCreds(user, pass);
  if (cached) {
    SessionManager.set(cached);
    window.location.href = cached.role === 'admin' ? 'admin.html' : 'tecnico.html';
  } else {
    showError('Sin conexión. Credenciales no válidas o expiradas.');
  }
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}
function togglePass() {
  const inp = document.getElementById('inputPass');
  const icon = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

// Redirigir si ya hay sesión activa
const existing = SessionManager.get();
if (existing) {
  window.location.href = existing.role === 'admin' ? 'admin.html' : 'tecnico.html';
}

// Estado de conexión
function updateOfflineBadge() {
  document.getElementById('offlineBadge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOfflineBadge);
window.addEventListener('offline', updateOfflineBadge);
updateOfflineBadge();

// Enter para login
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
