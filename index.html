<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>PRODENI · Control Vehicular</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --verde-deep: #1B5E20;
      --verde-corp: #2E7D32;
      --verde-light: #4CAF50;
      --dorado: #D4AF37;
      --dorado-light: #F9A825;
      --rojo: #C62828;
      --bg: #0F3A12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100svh;
      background: linear-gradient(135deg, var(--bg) 0%, #1B5E20 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,0.12), transparent 70%);
      top: -200px; right: -200px;
      border-radius: 50%;
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(40px,30px) scale(1.12); }
    }
    .card {
      background: white;
      border-radius: 32px;
      width: 92%;
      max-width: 420px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
      position: relative;
      z-index: 10;
      animation: slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--verde-corp), var(--verde-deep));
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(46,125,50,0.3);
    }
    .brand-logo i {
      font-size: 3.2rem;
      color: var(--dorado);
    }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--verde-deep);
      letter-spacing: -0.5px;
    }
    .brand-slogan {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--dorado);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .install-banner {
      display: none;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #FFF8E1, #FFECB3);
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 18px;
      cursor: pointer;
      border: 1px solid var(--dorado-light);
    }
    .install-banner.show { display: flex; }
    .install-banner-icon { font-size: 1.4rem; }
    .install-banner-text { flex: 1; }
    .install-banner-title { font-size: 0.8rem; font-weight: 800; color: var(--verde-deep); }
    .install-banner-sub { font-size: 0.65rem; color: #856404; }
    .btn-install-small {
      background: var(--verde-corp);
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 30px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
    }
    .offline-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #FFF3E0;
      border: 1px solid #FF9800;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #E65100;
      margin-bottom: 14px;
    }
    .offline-badge.show { display: flex; }
    .form-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.2rem;
      text-align: center;
    }
    .field {
      position: relative;
      margin-bottom: 14px;
    }
    .field i.icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #bbb;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 2px solid #e8e8e8;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.9rem;
      background: #fafafa;
      transition: all 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--verde-corp);
      background: white;
      box-shadow: 0 0 0 3px rgba(46,125,50,0.1);
    }
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--verde-corp), var(--verde-deep));
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      box-shadow: 0 8px 20px rgba(46,125,50,0.3);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(46,125,50,0.4);
    }
    .btn-login.loading {
      opacity: 0.8;
      pointer-events: none;
    }
    .btn-login .spinner { display: none; }
    .btn-login.loading .spinner { display: inline-flex; align-items: center; gap: 8px; }
    .btn-login.loading .btn-text { display: none; }
    .error-box {
      background: #FFEBEE;
      border: 1px solid #EF9A9A;
      border-radius: 12px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--rojo);
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-box.show { display: flex; }
    .version {
      text-align: center;
      font-size: 0.6rem;
      color: #ccc;
      margin-top: 1.4rem;
    }
    .fa-spin-c {
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-logo">
      <i class="fas fa-tractor"></i>
    </div>
    <h1>PRODENI</h1>
    <span class="brand-slogan">Control Vehicular</span>
  </div>

  <div class="install-banner" id="installBanner">
    <div class="install-banner-icon">📲</div>
    <div class="install-banner-text">
      <div class="install-banner-title">Instalar aplicación</div>
      <div class="install-banner-sub">Acceso directo · Funciona offline</div>
    </div>
    <button class="btn-install-small" id="btnInstall">Instalar</button>
  </div>

  <div class="offline-badge" id="offlineBadge">
    <i class="fas fa-wifi-slash"></i> Modo sin conexión
  </div>

  <p class="form-title">Acceso al sistema</p>

  <div class="field">
    <i class="fas fa-user icon"></i>
    <input type="text" id="inputUser" placeholder="Usuario" autocomplete="username">
  </div>
  <div class="field">
    <i class="fas fa-lock icon"></i>
    <input type="password" id="inputPass" placeholder="Contraseña" autocomplete="current-password">
    <button type="button" class="toggle-pass" onclick="togglePass()">
      <i class="fas fa-eye" id="eyeIcon"></i>
    </button>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i> INGRESAR</span>
    <span class="spinner"><i class="fas fa-leaf fa-spin-c"></i> Verificando...</span>
  </button>

  <div class="error-box" id="errorBox">
    <i class="fas fa-exclamation-circle"></i>
    <span id="errorMsg">Error</span>
  </div>

  <p class="version">PRODENI Control Vehicular v3.0</p>
</div>

<script>
// URL del Apps Script desplegado - CAMBIA ESTA URL POR LA TUYA
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGKkNNv7QHHrdfaSLmaSCeYl0ZghshplY7nYw5j7BY3h0Oqs3iseE2Oi18UXuOsfUj/exec';

localStorage.setItem('prodeni_script_url', SCRIPT_URL);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
}

// PWA Install
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

document.getElementById('btnInstall')?.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});

// Session Management
const Session = {
  KEY: 'prodeni_session',
  set(userData) {
    const expires = new Date();
    expires.setDate(expires.getDate() + 7);
    localStorage.setItem(this.KEY, JSON.stringify({
      ...userData,
      expiresAt: expires.getTime()
    }));
  },
  get() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (Date.now() > s.expiresAt) {
        localStorage.removeItem(this.KEY);
        return null;
      }
      return s;
    } catch(e) { return null; }
  },
  clear() { localStorage.removeItem(this.KEY); }
};

async function doLogin() {
  const user = document.getElementById('inputUser').value.trim();
  const pass = document.getElementById('inputPass').value.trim();
  const btn = document.getElementById('btnLogin');

  if (!user || !pass) {
    showError('Ingresa usuario y contraseña');
    return;
  }

  btn.classList.add('loading');
  hideError();

  const url = `${SCRIPT_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;

  try {
    const response = await fetch(url);
    const data = await response.json();

    if (data.valid) {
      Session.set(data.user);
      window.location.href = 'dashboard.html';
    } else {
      showError(data.message || 'Credenciales inválidas');
    }
  } catch (e) {
    console.error('Error de red:', e);
    showError('Error de conexión con el servidor. Verifica tu internet.');
  } finally {
    btn.classList.remove('loading');
  }
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}
function togglePass() {
  const inp = document.getElementById('inputPass');
  const ico = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

// Auto-redirect if already logged in
const existing = Session.get();
if (existing) window.location.href = 'dashboard.html';

function updateOffline() {
  document.getElementById('offlineBadge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOffline);
window.addEventListener('offline', updateOffline);
updateOffline();

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
