<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>PRODENI · Control Vehicular</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B5E20">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --verde-deep:  #1B5E20;
      --verde-corp:  #2E7D32;
      --verde-light: #4CAF50;
      --amarillo:    #F9A825;
      --rojo:        #C62828;
      --bg:          #0F3A12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100svh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(76,175,80,.15), transparent 70%);
      top: -200px; right: -200px;
      border-radius: 50%;
      animation: drift 14s ease-in-out infinite alternate;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(249,168,37,.1), transparent 70%);
      bottom: -100px; left: -100px;
      border-radius: 50%;
      animation: drift 18s ease-in-out infinite alternate-reverse;
      pointer-events: none;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.12); }
    }

    .card {
      background: white;
      border-radius: 28px;
      width: 92%;
      max-width: 400px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
      position: relative;
      z-index: 10;
      animation: slideUp .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* BRAND */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand-logo {
      width: 110px;
      height: auto;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 14px rgba(46,125,50,.3));
    }
    .brand-slogan {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--verde-corp);
      font-style: italic;
      letter-spacing: 1.2px;
    }

    /* OFFLINE BADGE */
    .offline-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #FFF8E1;
      border: 1.5px solid #F9A825;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #856404;
      margin-bottom: 14px;
    }
    .offline-badge.show { display: flex; }

    /* INSTALL BANNER */
    .install-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: #E8F5E9;
      border: 1.5px solid var(--verde-corp);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
      cursor: pointer;
    }
    .install-banner.show { display: flex; }
    .install-banner-icon { font-size: 1.4rem; }
    .install-banner-text { flex: 1; }
    .install-banner-title { font-size: 0.82rem; font-weight: 700; color: var(--verde-deep); }
    .install-banner-sub   { font-size: 0.7rem; color: var(--verde-corp); }
    .btn-install-small {
      background: var(--verde-corp);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    /* FORM */
    .form-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.1rem;
      text-align: center;
    }
    .field { position: relative; margin-bottom: 13px; }
    .field i.icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #bbb; font-size: 0.88rem;
      pointer-events: none;
    }
    .field input {
      width: 100%;
      padding: 13px 13px 13px 40px;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      background: #fafafa;
      transition: border-color .2s, background .2s;
      outline: none;
    }
    .field input:focus { border-color: var(--verde-corp); background: #fff; }
    .toggle-pass {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: #bbb;
      padding: 4px;
    }

    /* BOTONES */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--verde-corp), var(--verde-deep));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 8px 20px rgba(46,125,50,.35);
    }
    .btn-login:hover { transform: translateY(-2px); }
    .btn-login.loading { opacity: .8; pointer-events: none; }
    .btn-login .spinner { display: none; }
    .btn-login.loading .spinner { display: inline-flex; align-items: center; gap: 8px; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spin-c { animation: spin .8s linear infinite; display: inline-block; }

    /* ERROR */
    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 11px;
      font-size: 0.82rem;
      color: var(--rojo);
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-box.show { display: flex; }

    .version {
      text-align: center;
      font-size: 0.65rem;
      color: #ccc;
      margin-top: 1.4rem;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- BRAND -->
  <div class="brand">
    <img src="logo_prodeni.png" alt="PRODENI" class="brand-logo"
         onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
    <div id="logoFallback" style="display:none; font-size:2rem; font-weight:800; color:var(--verde-corp); margin-bottom:8px;">PRODENI</div>
    <span class="brand-slogan">Control Vehicular · Flota Sustentable</span>
  </div>

  <!-- INSTALL BANNER (aparece solo cuando el browser lo permite) -->
  <div class="install-banner" id="installBanner">
    <div class="install-banner-icon">📲</div>
    <div class="install-banner-text">
      <div class="install-banner-title">Instalar la app</div>
      <div class="install-banner-sub">Acceso directo, funciona sin internet</div>
    </div>
    <button class="btn-install-small" id="btnInstall">Instalar</button>
  </div>

  <!-- OFFLINE BADGE -->
  <div class="offline-badge" id="offlineBadge">
    <i class="fas fa-wifi-slash"></i> Modo sin conexión
  </div>

  <p class="form-title">Acceso al sistema</p>

  <div class="field">
    <i class="fas fa-user icon"></i>
    <input type="text" id="inputUser" placeholder="Usuario" autocomplete="username">
  </div>
  <div class="field">
    <i class="fas fa-lock icon"></i>
    <input type="password" id="inputPass" placeholder="Contraseña" autocomplete="current-password">
    <button type="button" class="toggle-pass" onclick="togglePass()">
      <i class="fas fa-eye" id="eyeIcon"></i>
    </button>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btn-text"><i class="fas fa-truck"></i> INGRESAR</span>
    <span class="spinner"><i class="fas fa-leaf fa-spin-c"></i> Verificando...</span>
  </button>

  <div class="error-box" id="errorBox">
    <i class="fas fa-exclamation-circle"></i>
    <span id="errorMsg">Error</span>
  </div>

  <p class="version">PRODENI Fleet v2.0</p>
</div>

<script>
// ============================================================
// URL DEL APPS SCRIPT — CAMBIA ESTO
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVdwSxXOZ7Q3jeNGf1aWoAhlYaTCyz1FXjrrpAGGU6bV1OappWIuymBXjghuJmaN4V/exec';

localStorage.setItem('prodeni_script_url', SCRIPT_URL);

// ============================================================
// SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ============================================================
// PWA INSTALL PROMPT
// ============================================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

document.getElementById('btnInstall').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
});

// ============================================================
// GESTOR DE SESIÓN — 7 días offline
// ============================================================
const Session = {
  KEY: 'prodeni_session',

  set(userData) {
    const now = new Date();
    // Expira en 7 días para permitir uso offline prolongado
    const expires = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000).getTime();
    localStorage.setItem(this.KEY, JSON.stringify({
      username: userData.username,
      role:     userData.role || 'tecnico',
      email:    userData.email || '',
      expiresAt: expires,
      loginAt:   now.getTime()
    }));
  },

  get() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (Date.now() > s.expiresAt) {
        localStorage.removeItem(this.KEY);
        return null;
      }
      return s;
    } catch(e) { return null; }
  },

  clear() { localStorage.removeItem(this.KEY); }
};

// ============================================================
// CREDENCIALES OFFLINE (válidas 7 días, no solo hoy)
// ============================================================
function hashCreds(u, p) {
  return btoa(unescape(encodeURIComponent(u + '::' + p + '::prodeni_v2')));
}

function saveOfflineCreds(username, password, role) {
  const expires = Date.now() + 7 * 24 * 60 * 60 * 1000;
  localStorage.setItem('prodeni_creds_v2', JSON.stringify({
    h: hashCreds(username, password),
    u: username, r: role, exp: expires
  }));
}

function checkOfflineCreds(username, password) {
  try {
    const raw = localStorage.getItem('prodeni_creds_v2');
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (Date.now() > c.exp) return null;
    if (c.h !== hashCreds(username, password)) return null;
    return { username: c.u, role: c.r };
  } catch(e) { return null; }
}

// ============================================================
// LOGIN
// ============================================================
async function doLogin() {
  const user = document.getElementById('inputUser').value.trim();
  const pass = document.getElementById('inputPass').value;
  if (!user || !pass) { showError('Ingresa usuario y contraseña'); return; }

  hideError();
  const btn = document.getElementById('btnLogin');
  btn.classList.add('loading');

  if (navigator.onLine) {
    try {
      const url = `${SCRIPT_URL}?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;
      const res  = await fetch(url, { cache: 'no-store' });
      const data = await res.json();

      if (data.valid && data.user) {
        const ud = { username: data.user.username, role: data.user.role || 'tecnico', email: data.user.email || '' };
        Session.set(ud);
        saveOfflineCreds(user, pass, ud.role);
        redirect(ud.role);
        return;
      } else {
        localStorage.removeItem('prodeni_creds_v2');
        showError(data.message || 'Credenciales incorrectas');
      }
    } catch(e) {
      // Red falló → intentar offline
      tryOffline(user, pass);
    }
  } else {
    tryOffline(user, pass);
  }

  btn.classList.remove('loading');
}

function tryOffline(user, pass) {
  const cached = checkOfflineCreds(user, pass);
  if (cached) {
    Session.set(cached);
    redirect(cached.role);
  } else {
    document.getElementById('btnLogin').classList.remove('loading');
    showError('Sin conexión. Inicia sesión en línea al menos una vez.');
  }
}

function redirect(role) {
  window.location.href = role === 'admin' ? 'admin.html' : 'tecnico.html';
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorBox').classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}
function togglePass() {
  const inp = document.getElementById('inputPass');
  const ico = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

// Redirigir si ya tiene sesión válida
const existing = Session.get();
if (existing) redirect(existing.role);

// Estado de conexión
function updateOffline() {
  document.getElementById('offlineBadge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOffline);
window.addEventListener('offline', updateOffline);
updateOffline();

// Enter para login
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
