<!-- modules/usuarios.html -->
<style>
.usr-wrap{max-width:900px;margin:0 auto}
.usr-header{margin-bottom:28px}
.usr-header h2{font-size:1.4rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.usr-header h2 i{color:var(--g3)}
.usr-header p{font-size:.76rem;color:var(--text3);margin-top:3px}
.usr-form-card{background:var(--surface);border-radius:var(--radius-lg);border:1.5px solid var(--border);padding:24px;margin-bottom:24px;box-shadow:var(--shadow-sm);transition:.2s}
.usr-form-card.editing{border-color:var(--g3);box-shadow:0 0 0 3px rgba(76,175,80,.1),var(--shadow-sm)}
.usr-form-title{font-size:.85rem;font-weight:800;color:var(--g1);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.usr-form-title i{color:var(--g3)}
.usr-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.usr-field{display:flex;flex-direction:column;gap:5px}
.usr-field label{font-size:.66rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.usr-field input,.usr-field select{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.85rem;color:var(--text);outline:none;background:var(--surface);transition:.18s}
.usr-field input:focus,.usr-field select:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.usr-form-actions{display:flex;gap:10px;margin-top:18px;justify-content:flex-end}
.panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow-sm)}
.panel-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.panel-title{font-size:.85rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.panel-title i{color:var(--g2)}
.count-pill{font-size:.7rem;background:var(--g5);color:var(--g2);padding:3px 10px;border-radius:20px;font-weight:700}
.usr-list{padding:0}
.usr-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);transition:.18s}
.usr-row:last-child{border-bottom:none}
.usr-row:hover{background:var(--surface2)}
.usr-row-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0}
.avatar-admin{background:linear-gradient(135deg,#F9A825,#E65100);color:white}
.avatar-tecnico{background:linear-gradient(135deg,var(--g3),var(--g2));color:white}
.usr-info{flex:1;min-width:0}
.usr-name{font-size:.88rem;font-weight:700;color:var(--text)}
.usr-email{font-size:.72rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap}
.role-admin{background:#FFF8E1;color:#E65100}
.role-tecnico{background:var(--g5);color:var(--g2)}
.usr-acts{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:32px;height:32px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:.18s}
.icon-btn.edit{color:var(--g2)}
.icon-btn.edit:hover{background:var(--g5);border-color:var(--g3)}
.icon-btn.del{color:var(--red)}
.icon-btn.del:hover{background:#FFEBEE;border-color:#EF9A9A}
.usr-empty{text-align:center;padding:48px 20px;color:var(--text3)}
.usr-empty i{font-size:2rem;opacity:.25;display:block;margin-bottom:10px}
</style>

<div class="usr-wrap">
  <div class="usr-header">
    <h2><i class="fas fa-users"></i> Gestión de Usuarios</h2>
    <p>Administración de técnicos y administradores del sistema</p>
  </div>

  <div class="usr-form-card" id="userFormCard">
    <div class="usr-form-title" id="formTitle"><i class="fas fa-user-plus"></i> Nuevo usuario</div>
    <div class="usr-grid">
      <div class="usr-field"><label>Usuario *</label><input type="text" id="userUsername" placeholder="nombre_usuario"></div>
      <div class="usr-field"><label>Contraseña <span id="passReq" style="color:var(--red)">*</span></label><input type="password" id="userPassword" placeholder="••••••••"></div>
      <div class="usr-field"><label>Rol</label><select id="userRole"><option value="tecnico">Técnico de campo</option><option value="admin">Administrador</option></select></div>
      <div class="usr-field"><label>Correo electrónico</label><input type="email" id="userEmail" placeholder="correo@prodeni.com"></div>
      <div class="usr-field"><label>Vehículo asignado</label>
        <select id="userVehiculo">
          <option value="">— Sin asignar —</option>
        </select>
      </div>
    </div>
    <div class="usr-form-actions">
      <button class="btn-secondary" onclick="cancelarEdicionUsuario()">Cancelar</button>
      <button class="btn-primary" onclick="guardarUsuario()"><i class="fas fa-save"></i> <span id="btnUserText">Crear usuario</span></button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><span class="panel-title"><i class="fas fa-list"></i> Usuarios registrados</span><span class="count-pill" id="totalUsuarios">0 usuarios</span></div>
    <div class="usr-list" id="usuariosList"><div class="usr-empty"><i class="fas fa-spinner fa-spin"></i><p>Cargando usuarios…</p></div></div>
  </div>
</div>

<script>
(function(){
let usuariosGlobal = [];
let editandoUsername = null;

window.cargarUsuarios = async function() {
  const list = document.getElementById('usuariosList');
  list.innerHTML = '<div class="usr-empty"><i class="fas fa-spinner fa-spin"></i><p>Cargando usuarios…</p></div>';
  if (!navigator.onLine) {
    const l = localStorage.getItem('prodeni_usuarios_cache');
    if (l) { usuariosGlobal = JSON.parse(l); renderUsuarios(usuariosGlobal); }
    else list.innerHTML = '<div class="usr-empty"><i class="fas fa-wifi-slash"></i><p>Sin conexión</p></div>';
    return;
  }
  try {
    const r = await fetch(`${window.SCRIPT_URL}?action=getUsers`);
    const d = await r.json();
    if (d.success && d.users) {
      usuariosGlobal = d.users;
      localStorage.setItem('prodeni_usuarios_cache', JSON.stringify(usuariosGlobal));
      renderUsuarios(usuariosGlobal);
    } else {
      list.innerHTML = '<div class="usr-empty"><i class="fas fa-users-slash"></i><p>No hay usuarios registrados</p></div>';
    }
  } catch(e) {
    list.innerHTML = '<div class="usr-empty"><i class="fas fa-triangle-exclamation"></i><p>Error al cargar usuarios</p></div>';
  }
};

function renderUsuarios(lista) {
  const list = document.getElementById('usuariosList');
  document.getElementById('totalUsuarios').textContent = `${lista.length} usuario${lista.length !== 1 ? 's' : ''}`;
  if (!lista.length) {
    list.innerHTML = '<div class="usr-empty"><i class="fas fa-users-slash"></i><p>No hay usuarios registrados</p></div>';
    return;
  }
  list.innerHTML = lista.map(u => {
    const isAdmin = u.role === 'admin';
    const ini = (u.username || '?')[0].toUpperCase();
    const veh = u.vehiculoAsignado || '';
    return `<div class="usr-row">
      <div class="usr-row-avatar ${isAdmin ? 'avatar-admin' : 'avatar-tecnico'}">${ini}</div>
      <div class="usr-info">
        <div class="usr-name">${u.username}</div>
        <div class="usr-email">${u.email || 'Sin correo'}</div>
        ${veh ? `<div style="margin-top:3px"><span style="font-size:.67rem;background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:12px;font-weight:700">🚛 ${veh}</span></div>` : ''}
      </div>
      <span class="role-badge ${isAdmin ? 'role-admin' : 'role-tecnico'}"><i class="fas ${isAdmin ? 'fa-shield-halved' : 'fa-hard-hat'}"></i>${isAdmin ? 'Administrador' : 'Técnico'}</span>
      <div class="usr-acts">
        <button class="icon-btn edit" onclick="editarUsuario('${u.username}')" title="Editar"><i class="fas fa-pen"></i></button>
        <button class="icon-btn" style="color:#1565C0" onclick="abrirModalAsignar('${u.username}','${veh}')" title="Asignar vehículo"><i class="fas fa-truck"></i></button>
        <button class="icon-btn del" onclick="eliminarUsuario('${u.username}')" title="Eliminar"><i class="fas fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
}

// Cargar vehículos en el select del form de usuario
async function cargarVehiculosEnSelect() {
  const sel = document.getElementById('userVehiculo');
  if (!sel) return;
  const vehiculos = JSON.parse(localStorage.getItem('prodeni_vehiculos_cache') || '[]');
  sel.innerHTML = '<option value="">— Sin asignar —</option>';
  vehiculos.filter(v => (v.activo || 'SI') === 'SI').forEach(v => {
    const o = document.createElement('option');
    o.value = v.placas;
    o.textContent = `${v.placas}${v.economico ? ' · ' + v.economico : ''} — ${[v.marca, v.modelo].filter(Boolean).join(' ')}`;
    sel.appendChild(o);
  });
  if (navigator.onLine) {
    try {
      const r = await fetch(`${window.SCRIPT_URL}?action=getVehiculos`);
      const d = await r.json();
      if (d.success) {
        localStorage.setItem('prodeni_vehiculos_cache', JSON.stringify(d.vehiculos));
        sel.innerHTML = '<option value="">— Sin asignar —</option>';
        d.vehiculos.filter(v => (v.activo || 'SI') === 'SI').forEach(v => {
          const o = document.createElement('option');
          o.value = v.placas;
          const asignado = v.usuarioAsignado ? ` [${v.usuarioAsignado}]` : '';
          o.textContent = `${v.placas}${v.economico ? ' · ' + v.economico : ''} — ${[v.marca, v.modelo].filter(Boolean).join(' ')}${asignado}`;
          sel.appendChild(o);
        });
      }
    } catch(e) {}
  }
}

// Modal de asignación rápida de vehículo
window.abrirModalAsignar = function(username, vehActual) {
  const vehiculos = JSON.parse(localStorage.getItem('prodeni_vehiculos_cache') || '[]');
  const opts = vehiculos.filter(v => (v.activo || 'SI') === 'SI').map(v =>
    `<option value="${v.placas}" ${v.placas === vehActual ? 'selected' : ''}>${v.placas}${v.economico ? ' · ' + v.economico : ''} — ${[v.marca, v.modelo].filter(Boolean).join(' ')}</option>`
  ).join('');

  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px';
  div.innerHTML = `
    <div style="background:var(--surface);border-radius:24px;width:100%;max-width:420px;padding:24px;box-shadow:0 24px 64px rgba(0,0,0,.18)">
      <h3 style="font-size:.95rem;font-weight:800;color:var(--g1);margin-bottom:4px"><i class="fas fa-truck"></i> Asignar vehículo</h3>
      <p style="font-size:.73rem;color:var(--text3);margin-bottom:16px">Usuario: <strong>${username}</strong></p>
      <select id="modalVehSel" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:.85rem;margin-bottom:16px">
        <option value="">— Sin asignar —</option>
        ${opts}
      </select>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn-secondary" onclick="this.closest('[style]').remove()">Cancelar</button>
        <button class="btn-primary" onclick="confirmarAsignacion('${username}',document.getElementById('modalVehSel').value,this.closest('[style]'))">
          <i class="fas fa-check"></i> Asignar
        </button>
      </div>
    </div>`;
  document.body.appendChild(div);
};

window.confirmarAsignacion = async function(username, placas, modal) {
  modal.remove();
  // Actualizar localmente
  usuariosGlobal = usuariosGlobal.map(u => u.username === username ? { ...u, vehiculoAsignado: placas } : u);
  localStorage.setItem('prodeni_usuarios_cache', JSON.stringify(usuariosGlobal));
  renderUsuarios(usuariosGlobal);
  window.toast(placas ? `Vehículo ${placas} asignado a ${username}` : `Asignación de ${username} liberada`, 'success');

  if (navigator.onLine) {
    try {
      await fetch(window.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'assignVehiculo', username, placas })
      });
      window.toast('Sincronizado ✓', 'success');
    } catch(e) {}
  }
};

window.guardarUsuario = async function() {
  const username = document.getElementById('userUsername').value.trim().toLowerCase();
  const password = document.getElementById('userPassword').value;
  const role = document.getElementById('userRole').value;
  const email = document.getElementById('userEmail').value.trim();
  const vehiculoAsignado = document.getElementById('userVehiculo').value;
  if (!username) { window.toast('El nombre de usuario es requerido', 'error'); return; }
  if (!editandoUsername && !password) { window.toast('La contraseña es requerida para nuevos usuarios', 'error'); return; }
  
  const userData = { username, role, email, vehiculoAsignado };
  if (password) userData.password = password;
  if (editandoUsername) userData.oldUsername = editandoUsername;
  
  // Guardar localmente
  if (editandoUsername) usuariosGlobal = usuariosGlobal.filter(u => u.username !== editandoUsername);
  usuariosGlobal.push({ username, role, email, vehiculoAsignado });
  localStorage.setItem('prodeni_usuarios_cache', JSON.stringify(usuariosGlobal));
  renderUsuarios(usuariosGlobal);
  window.toast(editandoUsername ? 'Usuario actualizado' : 'Usuario creado', 'success');
  cancelarEdicionUsuario();
  
  // Sincronizar con servidor
  if (navigator.onLine) {
    try {
      const action = editandoUsername ? 'updateUser' : 'createUser';
      await fetch(window.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...userData })
      });
      // Si tiene vehículo asignado, también sincronizar asignación
      if (vehiculoAsignado) {
        await fetch(window.SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'assignVehiculo', username, placas: vehiculoAsignado })
        });
      }
      window.toast('Sincronizado con la nube ✓', 'success');
    } catch(e) {}
  }
};

window.editarUsuario = function(username) {
  const u = usuariosGlobal.find(x => x.username === username);
  if (!u) return;
  editandoUsername = username;
  document.getElementById('userUsername').value = u.username;
  document.getElementById('userPassword').value = '';
  document.getElementById('userRole').value = u.role || 'tecnico';
  document.getElementById('userEmail').value = u.email || '';
  if (document.getElementById('userVehiculo')) document.getElementById('userVehiculo').value = u.vehiculoAsignado || '';
  document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-pen"></i> Editar usuario';
  document.getElementById('btnUserText').textContent = 'Guardar cambios';
  document.getElementById('passReq').style.display = 'none';
  document.getElementById('userFormCard').classList.add('editing');
};

window.cancelarEdicionUsuario = function() {
  editandoUsername = null;
  ['userUsername', 'userPassword', 'userEmail'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('userRole').value = 'tecnico';
  if (document.getElementById('userVehiculo')) document.getElementById('userVehiculo').value = '';
  document.getElementById('formTitle').innerHTML = '<i class="fas fa-user-plus"></i> Nuevo usuario';
  document.getElementById('btnUserText').textContent = 'Crear usuario';
  document.getElementById('passReq').style.display = 'inline';
  document.getElementById('userFormCard').classList.remove('editing');
};

window.eliminarUsuario = async function(username) {
  if (!confirm(`¿Eliminar al usuario "${username}"?`)) return;
  usuariosGlobal = usuariosGlobal.filter(u => u.username !== username);
  localStorage.setItem('prodeni_usuarios_cache', JSON.stringify(usuariosGlobal));
  renderUsuarios(usuariosGlobal);
  window.toast('Usuario eliminado localmente', 'success');
  if (navigator.onLine) {
    try {
      await fetch(`${window.SCRIPT_URL}?action=deleteUser&username=${encodeURIComponent(username)}`);
    } catch(e) {}
  }
};

window.cargarUsuarios();
cargarVehiculosEnSelect();
</script>
