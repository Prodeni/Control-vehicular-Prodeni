<!-- modules/inspeccion.html -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
.ins-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.ins-header h2{font-size:1.4rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.ins-header h2 i{color:var(--g3)}
.ins-header p{font-size:.76rem;color:var(--text3);margin-top:3px}
.folio-chip{background:var(--g5);border:1.5px solid #C8E6C9;color:var(--g1);padding:7px 16px;border-radius:30px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:6px}
.folio-chip i{font-size:.7rem;color:var(--g3)}
.tab-progress{display:flex;background:var(--surface);border-radius:var(--radius-xl);padding:5px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid var(--border);overflow-x:auto;gap:3px}
.tp-btn{flex:1;min-width:fit-content;padding:9px 14px;border-radius:40px;background:none;border:none;font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer;color:var(--text3);white-space:nowrap;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px;position:relative}
.tp-btn:hover{background:var(--g5);color:var(--g2)}
.tp-btn.active{background:linear-gradient(135deg,var(--g2),var(--g1));color:white;box-shadow:0 4px 12px rgba(46,125,50,.3)}
.tp-btn i{font-size:.78rem}
.tp-num{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.25);font-size:.6rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.tp-btn:not(.active) .tp-num{background:var(--border);color:var(--text3)}
.ins-section{background:var(--surface);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.ins-section-title{font-size:.83rem;font-weight:800;color:var(--g1);margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ins-section-title i{color:var(--g3);font-size:.85rem}
.f-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.f-grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.f input,.f select,.f textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.85rem;color:var(--text);outline:none;background:var(--surface);transition:.18s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.f input[readonly]{background:var(--surface2);color:var(--text3)}
.f textarea{resize:vertical;min-height:75px}
.span-2{grid-column:span 2}
@media(max-width:600px){.span-2{grid-column:span 1}}
.cat-section{margin-bottom:20px}
.cat-title{font-size:.73rem;font-weight:800;color:var(--g2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:10px;border-left:3px solid var(--g3);display:flex;align-items:center;gap:6px}
.est-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.est-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;transition:.18s}
.est-item:has(.e-btn.active.ok){border-color:#A5D6A7;background:#F1F8E9}
.est-item:has(.e-btn.active.reg){border-color:#FFE082;background:#FFFDE7}
.est-item:has(.e-btn.active.mal){border-color:#EF9A9A;background:#FFF5F5}
.est-item span{font-size:.78rem;font-weight:500;color:var(--text)}
.est-btns{display:flex;gap:4px}
.e-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);font-size:.67rem;font-weight:800;cursor:pointer;background:var(--surface);color:var(--text3);transition:.18s;font-family:inherit}
.e-btn:hover{transform:scale(1.06)}
.e-btn.ok.active{background:var(--g2);color:white;border-color:var(--g2)}
.e-btn.reg.active{background:#F9A825;color:white;border-color:#F9A825}
.e-btn.mal.active{background:var(--red);color:white;border-color:var(--red)}
.mantto-cat{background:var(--surface2);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:12px;border:1px solid var(--border)}
.mantto-cat h4{font-size:.73rem;font-weight:800;color:var(--g1);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.mantto-items{display:flex;flex-wrap:wrap;gap:8px}
.mantto-label{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:.76rem;font-weight:600;color:var(--text2);transition:.18s;user-select:none}
.mantto-label:hover{border-color:var(--g3);color:var(--g2);background:var(--g5)}
.mantto-label input{position:absolute;opacity:0;pointer-events:none}
.mantto-label:has(input:checked){background:var(--g2);color:white;border-color:var(--g2)}
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px}
.foto-slot{aspect-ratio:1;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed var(--border);overflow:hidden;position:relative;transition:.2s}
.foto-slot:hover{border-color:var(--g3);background:var(--g5)}
.foto-slot.has-photo{border-style:solid;border-color:var(--g3)}
.foto-preview{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text3);font-size:.67rem;text-align:center;padding:8px}
.foto-preview i{font-size:1.4rem}
.foto-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gps-box{background:var(--surface2);border-radius:var(--radius-lg);padding:24px;text-align:center;border:1.5px solid var(--border)}
.gps-icon{font-size:2.5rem;color:var(--g3);margin-bottom:12px;display:block}
#gpsCoordsDisplay{font-family:monospace;font-size:.85rem;color:var(--text2);margin:10px 0 18px;font-weight:600}
.gps-coords-ok{color:var(--g2)!important}
.action-bar{position:sticky;bottom:20px;background:var(--surface);border-radius:60px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:20px;box-shadow:0 8px 32px rgba(0,0,0,.14);border:1px solid var(--border);z-index:50}
.sync-status{font-size:.72rem;color:var(--text3);display:flex;align-items:center;gap:6px}
.sync-status i{color:var(--g3)}
.action-btns{display:flex;gap:8px}
.tab-pane{display:none}
.tab-pane.active{display:block;animation:paneIn .25s ease both}
@keyframes paneIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.veh-selector{background:var(--surface);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;border:1px solid var(--border)}
.veh-selector label{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:5px;display:block}
.veh-selector select{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:40px;font-family:inherit;font-size:.85rem;background:var(--surface)}
</style>

<div style="max-width:1200px;margin:0 auto">
  <div class="ins-header">
    <div>
      <h2><i class="fas fa-clipboard-list"></i> Inspección Vehicular</h2>
      <p>Complete todos los campos para registrar el estado de la unidad</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="folio-chip"><i class="fas fa-hashtag"></i> <span id="folioDisplay">—</span></div>
      <button class="btn-secondary" onclick="location.reload()" style="padding:8px 16px;font-size:.76rem">
        <i class="fas fa-plus"></i> Nueva
      </button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- DROPDOWN DE VEHÍCULOS - RESTAURADO           -->
  <!-- ============================================ -->
  <div class="veh-selector">
    <label><i class="fas fa-truck"></i> Seleccionar vehículo del catálogo</label>
    <select id="vehiculoSelector" onchange="cargarDatosVehiculo()">
      <option value="">— Seleccione una unidad —</option>
    </select>
    <p style="font-size:.7rem;color:var(--text3);margin-top:6px">* Si el vehículo no está en la lista, regístrelo primero en el módulo Vehículos</p>
  </div>

  <div class="tab-progress">
    <button class="tp-btn active" data-tab="vehiculo"><span class="tp-num">1</span><i class="fas fa-truck"></i> Vehículo</button>
    <button class="tp-btn" data-tab="responsable"><span class="tp-num">2</span><i class="fas fa-user"></i> Responsable</button>
    <button class="tp-btn" data-tab="estado"><span class="tp-num">3</span><i class="fas fa-clipboard-check"></i> Estado</button>
    <button class="tp-btn" data-tab="mantenimiento"><span class="tp-num">4</span><i class="fas fa-wrench"></i> Mant.</button>
    <button class="tp-btn" data-tab="fotos"><span class="tp-num">5</span><i class="fas fa-camera"></i> Fotos</button>
    <button class="tp-btn" data-tab="gps"><span class="tp-num">6</span><i class="fas fa-map-pin"></i> GPS</button>
  </div>

  <div id="inspeccionContent">
    <div style="text-align:center;padding:60px;color:var(--text3)">
      <i class="fas fa-spinner fa-spin" style="font-size:1.8rem;color:var(--g3)"></i>
      <p style="margin-top:12px;font-size:.83rem">Cargando formulario…</p>
    </div>
  </div>

  <div class="action-bar">
    <div class="sync-status" id="syncStatus"><i class="fas fa-circle-check"></i> Listo para guardar</div>
    <div class="action-btns">
      <button class="btn-secondary" id="btnDescargarPDF" onclick="descargarPDFManual()" style="padding:8px 16px;font-size:.76rem"><i class="fas fa-file-pdf"></i> Descargar PDF</button>
      <button class="btn-primary" id="btnGuardarInspeccion" onclick="guardarInspeccionCompleta()"><i class="fas fa-save"></i> Guardar inspección</button>
    </div>
  </div>
</div>

<script>
(function(){
let currentFolio = null;
let editingFolio = sessionStorage.getItem('editarFolio');
let gpsData = null;
let fotosData = { principales: [], danios: [] };
let vehiculosCatalogo = [];

// ============================================
// CATÁLOGO DE MARCAS / MODELOS / VERSIONES
// ============================================

  'Carrocería y Exterior': ['Capó', 'Parabrisas frontal', 'Puertas', 'Defensas', 'Pintura general', 'Espejos', 'Luces', 'Caja de carga'],

  'Frenos y Suspensión': ['Balatas delanteras', 'Balatas traseras', 'Balanceo', 'Alineación', 'Rotación llantas'],
  'Eléctrico y Seguridad': ['Batería', 'Fusibles', 'Luces', 'Bocina', 'Cinturones', 'Limpiaparabrisas']
};

function generarFolio() {
  const d = new Date();
  currentFolio = `PROD-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`;
  const fd = document.getElementById('folioDisplay');
  if (fd) fd.textContent = currentFolio;
}
window.generarFolio = generarFolio;

// Cargar vehículos para el selector (dropdown)
async function cargarVehiculosSelector() {
  const sel = document.getElementById('vehiculoSelector');
  if (!sel) return;
  
  const cache = localStorage.getItem('prodeni_vehiculos_cache');
  if (cache) {
    vehiculosCatalogo = JSON.parse(cache);
  } else if (navigator.onLine) {
    try {
      const r = await fetch(`${window.SCRIPT_URL}?action=getVehiculos`);
      const d = await r.json();
      if (d.success && d.vehiculos) {
        vehiculosCatalogo = d.vehiculos;
        localStorage.setItem('prodeni_vehiculos_cache', JSON.stringify(vehiculosCatalogo));
      }
    } catch(e) {}
  }
  
  // Llenar el dropdown con opciones
  sel.innerHTML = '<option value="">— Seleccione una unidad —</option>' + 
    vehiculosCatalogo.map(v => {
      // Icono de marca para el dropdown
      const marcaIcono = {
        'RAM': '🐏', 'Nissan': '🇯🇵', 'Chevrolet': '🏁', 'Ford': '🛻', 'Freightliner': '🚛'
      }[v.marca] || '🚗';
      return `<option value="${v.placas}">${marcaIcono} ${v.placas} · ${v.marca || ''} ${v.modelo || ''} · ${v.conductor || 'Sin conductor'}</option>`;
    }).join('');
}

// Auto-llenar datos del vehículo seleccionado (como Odoo)
window.cargarDatosVehiculo = function() {
  const placas = document.getElementById('vehiculoSelector').value;
  if (!placas) return;
  
  const vehiculo = vehiculosCatalogo.find(v => v.placas === placas);
  if (!vehiculo) return;
  
  // Llenar campos del formulario
  const campos = {
    'placas': vehiculo.placas || '',
    'economico': vehiculo.economico || '',
    'marca': vehiculo.marca || '',
    'modelo': vehiculo.modelo || '',
    'version': vehiculo.version || '',
    'anio': vehiculo.anio || '',
    'color': vehiculo.color || '',
    'vin': vehiculo.vin || '',
    'conductor': vehiculo.conductor || '',
    'telefono': vehiculo.telefono || '',
    'email': vehiculo.email || '',
    'ruta': vehiculo.ruta || '',
    'baseOrigen': vehiculo.baseOrigen || ''
  };
  
  Object.entries(campos).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.value = val;
  });
  
  window.toast(`Datos de ${placas} cargados. Modifique solo lo necesario.`, 'success');
};

          </div>

            </select>
          </div>
          <div class="f"><label>Año</label>
            <select id="anio">
              <option value="">— Seleccione año —</option>
            </select>
          </div>
          <div class="f"><label>Color</label><input type="text" id="color" placeholder="Blanco"></div>
          <div class="f"><label>NIV / VIN</label><input type="text" id="vin" placeholder="3C6UR5DL0MG123456" maxlength="17"></div>
        </div>
      </div>
      <div class="ins-section">

        <div class="f-grid-4">

          <div class="f"><label>Vigencia licencia</label><input type="date" id="vigenciaLicencia"></div>
        </div>
      </div>
      <div class="ins-section">
        <div class="ins-section-title"><i class="fas fa-route"></i> Ruta y operación</div>
        <div class="f-grid">

          <div class="f"><label>Turno</label><select id="turno"><option>Matutino (6am-2pm)</option><option>Diurno (9am-6pm)</option><option>Vespertino (2pm-10pm)</option><option>Nocturno (10pm-6am)</option></select></div>

    <div class="tab-pane" id="tab-estado">
      <div id="estadoDinamico"></div>
      <div class="ins-section">

function initTabs() {
  document.querySelectorAll('.tp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tp-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });
}

function construirEstado() {
  const c = document.getElementById('estadoDinamico');
  if (!c) return;
  c.innerHTML = '';
  Object.entries(CATEGORIAS_ESTADO).forEach(([cat, items]) => {
    const d = document.createElement('div');
    d.className = 'cat-section ins-section';
    d.innerHTML = `<div class="cat-title"><i class="fas fa-tag"></i>${cat}</div><div class="est-grid" id="estado-${cat.replace(/ /g, '')}"></div>`;
    c.appendChild(d);
    const grid = d.querySelector('.est-grid');
    items.forEach(item => {
      grid.innerHTML += `<div class="est-item"><span>${item}</span><div class="est-btns"><button type="button" class="e-btn ok" data-item="${item}" data-val="OK" onclick="setEstado(this,'OK')">OK</button><button type="button" class="e-btn reg" data-item="${item}" data-val="REG" onclick="setEstado(this,'REG')">REG</button><button type="button" class="e-btn mal" data-item="${item}" data-val="MAL" onclick="setEstado(this,'MAL')">MAL</button></div></div>`;
    });
  });
}

window.setEstado = function(btn, valor) {
  const c = btn.closest('.est-btns');
  c.querySelectorAll('.e-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.selected = valor;

  // Si es MAL, mostrar slot de evidencia fotográfica
  const item = btn.closest('.est-item');
  const compName = item.querySelector('span').textContent;
  let evidenceSlot = item.querySelector('.evidence-slot');
  if (valor === 'MAL') {
    if (!evidenceSlot) {
      const div = document.createElement('div');
      div.className = 'evidence-slot';
      div.style.cssText = 'width:100%;margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap';
      div.innerHTML = `
        <input type="file" accept="image/*" capture="environment" id="evid_${compName.replace(/\s/g,'_')}" style="display:none" onchange="previewEvidencia(this,'${compName.replace(/'/g,"\\'")}')">
        <button type="button" onclick="document.getElementById('evid_${compName.replace(/\s/g,'_')}').click()" style="padding:5px 10px;border-radius:16px;border:1.5px solid var(--red);background:#FFF5F5;color:var(--red);font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px"><i class="fas fa-camera"></i> Adjuntar evidencia</button>
        <img id="evidimg_${compName.replace(/\s/g,'_')}" style="display:none;height:40px;border-radius:6px">
        <input type="text" placeholder="Observación del daño…" id="evidobs_${compName.replace(/\s/g,'_')}" style="flex:1;min-width:140px;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.75rem;font-family:inherit">
      `;
      item.appendChild(div);
    } else {
      evidenceSlot.style.display = 'flex';
    }
  } else if (evidenceSlot) {
    evidenceSlot.style.display = 'none';
  }
};

window.previewEvidencia = function(input, compName) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const key = compName.replace(/\s/g, '_');
    const img = document.getElementById('evidimg_' + key);
    if (img) { img.src = e.target.result; img.style.display = 'block'; }
    // Guardar en fotosData para incluir en el guardado
    if (!fotosData.evidencias) fotosData.evidencias = {};
    fotosData.evidencias[compName] = e.target.result;
  };
  reader.readAsDataURL(f);
};

function obtenerEstados() {

window.previewFoto = function(input) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  const t = input.dataset.type;
  const i = input.dataset.idx;
  const lbl = input.dataset.label;
  reader.onload = function(e) {
    const img = document.getElementById(`img${t === 'principal' ? 'P' : 'D'}_${i}`);
    const prev = document.getElementById(`preview${t === 'principal' ? 'P' : 'D'}_${i}`);
    const slot = document.getElementById(`slot${t === 'principal' ? 'P' : 'D'}_${i}`);
    if (img) img.src = e.target.result;
    if (img) img.style.display = 'block';
    if (prev) prev.style.display = 'none';
    if (slot) slot.classList.add('has-photo');
    if (!fotosData[t === 'principal' ? 'principales' : 'danios']) fotosData[t === 'principal' ? 'principales' : 'danios'] = [];
    fotosData[t === 'principal' ? 'principales' : 'danios'][i] = { label: lbl, data: e.target.result };
  };
  reader.readAsDataURL(f);
};

function obtenerFotosParaGuardar() {
  const todas = [];
  [...(fotosData.principales || []), ...(fotosData.danios || [])].forEach(f => { if (f && f.data) todas.push({ label: f.label, data: f.data }); });
  return todas;
}

window.capturarGPS = function() {
  if (!navigator.geolocation) { window.toast('GPS no disponible', 'error'); return; }
  window.toast('Obteniendo ubicación…', 'info');
  navigator.geolocation.getCurrentPosition(
    pos => { gpsData = { lat: pos.coords.latitude, lon: pos.coords.longitude }; const el = document.getElementById('gpsCoordsDisplay'); if (el) { el.innerHTML = `${gpsData.lat.toFixed(6)}, ${gpsData.lon.toFixed(6)}`; el.className = 'gps-coords-ok'; } window.toast('GPS capturado ✓', 'success'); },
    err => window.toast('Error GPS: ' + err.message, 'error'),
    { enableHighAccuracy: true, timeout: 10000 }
  );
};

async function cargarInspeccionExistente(folio) {
  if (!navigator.onLine) { window.toast('Sin conexión', 'error'); return; }
  try {
    const r = await fetch(`${window.SCRIPT_URL}?action=getInspeccion&folio=${folio}`);
    const d = await r.json();
    if (d.success && d.inspeccion) {
      const i = d.inspeccion;
      ['marca', 'modelo', 'placas', 'economico', 'vin', 'kmActual', 'conductor', 'ruta', 'dictamen', 'obsGenerales'].forEach(f => { const el = document.getElementById(f); if (el) el.value = i[f] || ''; });
      if (i.estados) {
        Object.entries(i.estados).forEach(([it, v]) => { const btn = document.querySelector(`.e-btn[data-item="${it}"][data-val="${v}"]`); if (btn) btn.click(); });
      }
      window.toast('Inspección cargada', 'success');
    }
  } catch(e) { window.toast('Error al cargar', 'error'); }
}

window.onMarcaChange = function() {
  const marca = document.getElementById('marca').value;
  const modeloSel = document.getElementById('modelo');
  const versionSel = document.getElementById('version');
  const anioSel = document.getElementById('anio');

  // Reset dependientes
  versionSel.innerHTML = '<option value="">— Primero seleccione modelo —</option>';
  anioSel.innerHTML = '<option value="">— Seleccione año —</option>';

  if (!marca || marca === '__otra__') {
    modeloSel.innerHTML = '<option value="">— Seleccione modelo —</option>';
    if (marca === '__otra__') {
      // Convertir a inputs de texto libre
      modeloSel.outerHTML = '<input type="text" id="modelo" placeholder="Escriba el modelo">';
      versionSel.outerHTML = '<input type="text" id="version" placeholder="Escriba la versión">';
      anioSel.outerHTML = '<input type="number" id="anio" placeholder="2024" min="2000" max="2030">';
      document.getElementById('marca').outerHTML = '<input type="text" id="marca" placeholder="Escriba la marca">';
    }
    return;
  }

  const modelos = CATALOGO_VEHICULOS[marca];
  if (!modelos) return;
  modeloSel.innerHTML = '<option value="">— Seleccione modelo —</option>' +
    Object.keys(modelos).map(m => `<option value="${m}">${m}</option>`).join('');
};

window.onModeloChange = function() {
  const marca = document.getElementById('marca').value;
  const modelo = document.getElementById('modelo').value;
  const versionSel = document.getElementById('version');
  const anioSel = document.getElementById('anio');

  if (!marca || !modelo || !CATALOGO_VEHICULOS[marca] || !CATALOGO_VEHICULOS[marca][modelo]) {
    versionSel.innerHTML = '<option value="">— Primero seleccione modelo —</option>';
    anioSel.innerHTML = '<option value="">— Seleccione año —</option>';
    return;
  }

  const info = CATALOGO_VEHICULOS[marca][modelo];
  versionSel.innerHTML = '<option value="">— Seleccione versión —</option>' +
    info.versiones.map(v => `<option value="${v}">${v}</option>`).join('');
  anioSel.innerHTML = '<option value="">— Seleccione año —</option>' +
    [...info.anios].reverse().map(a => `<option value="${a}">${a}</option>`).join('');
};

// GENERAR PDF DE INSPECCIÓN CON jsPDF
// ============================================
function generarPDFInspeccion(datos) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'letter');
  const w = 216, margin = 15;
  let y = 15;

  // Header
  pdf.setFillColor(27, 94, 32);
  pdf.rect(0, 0, w, 32, 'F');
  pdf.setFillColor(212, 175, 55);
  pdf.rect(0, 32, w, 2, 'F');
  pdf.setTextColor(255,255,255);
  pdf.setFontSize(18);
  pdf.setFont('helvetica', 'bold');
  pdf.text('PRODENI', margin, 16);
  pdf.setFontSize(10);
  pdf.setFont('helvetica', 'normal');
  pdf.text('Control Vehicular - Inspección', margin, 23);
  pdf.setFontSize(9);
  pdf.text(`Folio: ${datos.folio}`, w - margin, 14, { align: 'right' });
  pdf.text(`Fecha: ${datos.fecha}`, w - margin, 20, { align: 'right' });
  pdf.text(`Inspector: ${datos.usuario}`, w - margin, 26, { align: 'right' });

  y = 40;
  pdf.setTextColor(27, 94, 32);
  pdf.setFontSize(11);
  pdf.setFont('helvetica', 'bold');
  pdf.text('DATOS DEL VEHÍCULO', margin, y);
  y += 2;
  pdf.setDrawColor(200,220,200);
  pdf.line(margin, y, w - margin, y);
  y += 6;

  pdf.setTextColor(60,60,60);
  pdf.setFontSize(9);
  pdf.setFont('helvetica', 'normal');
  const campos = [
    ['Placas', datos.placas], ['No. Económico', datos.economico], ['Marca', datos.marca],
    ['Modelo', datos.modelo], ['Versión', datos.version], ['Año', datos.anio],
    ['Color', datos.color], ['VIN', datos.vin], ['Km actual', datos.kmActual + ' km'],
    ['Conductor', datos.conductor], ['Ruta', datos.ruta], ['Dictamen', datos.dictamen]
  ];

  let col = 0;
  campos.forEach(([lbl, val]) => {
    const x = margin + (col * 62);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(120,120,120);
    pdf.text(lbl + ':', x, y);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(30,30,30);
    pdf.text(String(val || '—'), x, y + 4.5);
    col++;
    if (col >= 3) { col = 0; y += 12; }
  });
  if (col > 0) y += 12;

  // Estado de componentes
  if (datos.estados && Object.keys(datos.estados).length) {
    y += 4;
    pdf.setTextColor(27, 94, 32);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('ESTADO DE COMPONENTES', margin, y);
    y += 2;
    pdf.line(margin, y, w - margin, y);
    y += 6;

    pdf.setFontSize(8);
    Object.entries(datos.estados).forEach(([comp, estado]) => {
      if (y > 260) { pdf.addPage(); y = 20; }
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(60,60,60);
      pdf.text(comp, margin, y);

      const colors = { OK: [46,125,50], REG: [249,168,37], MAL: [198,40,40] };
      const c = colors[estado] || [100,100,100];
      pdf.setTextColor(c[0], c[1], c[2]);
      pdf.setFont('helvetica', 'bold');
      pdf.text(estado, margin + 80, y);
      y += 5;
    });
  }

  // Servicios realizados
  if (datos.serviciosRealizados && datos.serviciosRealizados.length) {
    y += 4;
    if (y > 250) { pdf.addPage(); y = 20; }
    pdf.setTextColor(27, 94, 32);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('SERVICIOS REALIZADOS', margin, y);
    y += 8;
    pdf.setFontSize(8);
    pdf.setTextColor(60,60,60);
    pdf.setFont('helvetica', 'normal');
    datos.serviciosRealizados.forEach(s => {
      if (y > 260) { pdf.addPage(); y = 20; }
      pdf.text('• ' + s, margin + 4, y);
      y += 5;
    });
  }

  // Fallas y observaciones
  if (datos.fallaDetectada) {
    y += 4;
    if (y > 250) { pdf.addPage(); y = 20; }
    pdf.setTextColor(198, 40, 40);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('FALLA DETECTADA', margin, y);
    y += 6;
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(60,60,60);
    const lines = pdf.splitTextToSize(datos.fallaDetectada, w - margin * 2);
    pdf.text(lines, margin, y);
    y += lines.length * 5;
  }

  if (datos.accionCorrectiva) {
    y += 2;
    pdf.setTextColor(27, 94, 32);
    pdf.setFont('helvetica', 'bold');
    pdf.text('Acción correctiva:', margin, y);
    y += 5;
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(60,60,60);
    const lines2 = pdf.splitTextToSize(datos.accionCorrectiva, w - margin * 2);
    pdf.text(lines2, margin, y);
    y += lines2.length * 5;
  }

  if (datos.obsGenerales) {
    y += 4;
    if (y > 250) { pdf.addPage(); y = 20; }
    pdf.setTextColor(27, 94, 32);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('OBSERVACIONES GENERALES', margin, y);
    y += 6;
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(60,60,60);
    const lines3 = pdf.splitTextToSize(datos.obsGenerales, w - margin * 2);
    pdf.text(lines3, margin, y);
  }

  // GPS
  if (datos.lat && datos.lon) {
    y += 10;
    if (y > 260) { pdf.addPage(); y = 20; }
    pdf.setFontSize(8);
    pdf.setTextColor(120,120,120);
    pdf.text(`Ubicación GPS: ${datos.lat}, ${datos.lon}`, margin, y);
  }

  // Footer
  const totalPages = pdf.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    pdf.setPage(i);
    pdf.setFontSize(7);
    pdf.setTextColor(180,180,180);
    pdf.text(`PRODENI Fleet Management · ${datos.folio} · Página ${i}/${totalPages}`, w / 2, 275, { align: 'center' });
  }

  return pdf;
}

    accionCorrectiva: document.getElementById('accionCorrectiva')?.value || '',
    taller: document.getElementById('taller')?.value || '',
    costo: document.getElementById('costo')?.value || '',
    obsGenerales: document.getElementById('obsGenerales')?.value || '',
    lat: gpsData?.lat || '',
    lon: gpsData?.lon || '',
    timestamp: Date.now()
  };

  const btn = document.getElementById('btnGuardarInspeccion');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando…'; }

  // 1. Guardar localmente siempre
  const pendientes = JSON.parse(localStorage.getItem('prodeni_pendientes') || '[]');
  pendientes.push({ ts: Date.now(), data: datos });
  localStorage.setItem('prodeni_pendientes', JSON.stringify(pendientes));

  // 2. Generar PDF y ofrecer descarga
  try {
    const pdf = generarPDFInspeccion(datos);
    pdf.save(`Inspeccion_${datos.folio}_${datos.placas}.pdf`);
    window.toast('PDF generado y descargado ✓', 'success');
  } catch(e) {
    console.error('Error PDF:', e);
    window.toast('Error al generar PDF: ' + e.message, 'warn');
  }

  // 3. Sincronizar con servidor (FIX CORS: usar text/plain para evitar preflight)
  if (navigator.onLine) {
    try {
      const response = await fetch(window.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(datos)
      });
      const result = await response.json();
      if (result.success) {
        window.toast('Sincronizado con Google Sheets ✓', 'success');
        if (syncEl) syncEl.innerHTML = '<i class="fas fa-circle-check"></i> Guardado en la nube';
        // Quitar de pendientes
        const nuevosPendientes = JSON.parse(localStorage.getItem('prodeni_pendientes') || '[]').filter(p => p.data.folio !== currentFolio);
        localStorage.setItem('prodeni_pendientes', JSON.stringify(nuevosPendientes));
      } else {
        window.toast('Error en servidor: ' + (result.message || ''), 'warn');
        if (syncEl) syncEl.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Guardado offline (pendiente de sync)';
      }
    } catch(e) {
      console.warn('Error de sync:', e);
      window.toast('Sin conexión al servidor. Guardado localmente.', 'warn');
      if (syncEl) syncEl.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Guardado offline';
    }
  } else {
    if (syncEl) syncEl.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Guardado offline';
    window.toast('Inspección guardada localmente (sin conexión)', 'info');
  }

  // 4. Generar alertas por componentes en MAL
  const componentesMal = Object.entries(datos.estados).filter(([,v]) => v === 'MAL');
  if (componentesMal.length > 0) {
    const alertas = JSON.parse(localStorage.getItem('prodeni_alertas') || '[]');
    componentesMal.forEach(([comp]) => {
      const obsEl = document.getElementById('evidobs_' + comp.replace(/\s/g, '_'));
      alertas.push({
        tipo: 'inspeccion_falla',
        fecha: datos.fecha,
        hora: new Date().toLocaleTimeString('es-MX'),
        usuario: datos.usuario,
        placas: datos.placas,
        componente: comp,
        mensaje: `Componente "${comp}" en MAL estado - ${datos.placas}`,
        observacion: obsEl ? obsEl.value : '',
        folio: datos.folio,
        tieneEvidencia: !!(fotosData.evidencias && fotosData.evidencias[comp]),
        leida: false,
        timestamp: Date.now()
      });
    });
    localStorage.setItem('prodeni_alertas', JSON.stringify(alertas));
    window.toast(`${componentesMal.length} alerta(s) generada(s) para el administrador`, 'warn');

    // Enviar notificación por correo al admin (vía Apps Script)
    if (navigator.onLine) {
      try {
        await fetch(window.SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'sendAlertEmail',
            placas: datos.placas,
            folio: datos.folio,
            usuario: datos.usuario,
            fecha: datos.fecha,
            componentes: componentesMal.map(([c]) => c).join(', '),
            mensaje: `Se detectaron ${componentesMal.length} componente(s) en MAL estado durante la inspección ${datos.folio} del vehículo ${datos.placas}.`
          })
        });
      } catch(e) { /* silencioso si falla el email */ }
    }
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Guardar inspección'; }
  setTimeout(() => { if (confirm('¿Iniciar una nueva inspección?')) location.reload(); }, 1500);
};

// Descargar PDF sin guardar (solo preview)
window.descargarPDFManual = function() {
  const placas = document.getElementById('placas')?.value?.trim().toUpperCase();
  if (!placas) { window.toast('Llene al menos las placas antes de generar PDF', 'warn'); return; }
  const datos = {
    folio: currentFolio,
    fecha: new Date().toISOString().slice(0, 10),
    usuario: (window.currentUser || {}).username || 'tecnico',
    marca: document.getElementById('marca')?.value || '',
    modelo: document.getElementById('modelo')?.value || '',
    version: document.getElementById('version')?.value || '',
    anio: document.getElementById('anio')?.value || '',
    color: document.getElementById('color')?.value || '',
    placas: placas,
    economico: document.getElementById('economico')?.value || '',
    vin: document.getElementById('vin')?.value || '',
    kmActual: document.getElementById('kmActual')?.value || '',
    conductor: document.getElementById('conductor')?.value || '',
    ruta: document.getElementById('ruta')?.value || '',
    dictamen: document.getElementById('dictamen')?.value || '',
    estados: obtenerEstados(),
    serviciosRealizados: obtenerServicios(),
    fallaDetectada: document.getElementById('fallaDetectada')?.value || '',
    accionCorrectiva: document.getElementById('accionCorrectiva')?.value || '',
    obsGenerales: document.getElementById('obsGenerales')?.value || '',
    lat: gpsData?.lat || '',
    lon: gpsData?.lon || ''
  };
  try {
    const pdf = generarPDFInspeccion(datos);
    pdf.save(`Inspeccion_${datos.folio}_${placas}.pdf`);
    window.toast('PDF descargado ✓', 'success');
  } catch(e) {
    window.toast('Error al generar PDF: ' + e.message, 'error');
  }
};

// Inicializar
cargarFormulario();
if (editingFolio) { cargarInspeccionExistente(editingFolio); sessionStorage.removeItem('editarFolio'); }
})();
