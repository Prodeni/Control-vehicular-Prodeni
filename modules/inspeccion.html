<!-- modules/inspeccion.html -->
<style>
/* ── Layout ───────────────────────────────────────── */
.ins-wrap{max-width:1100px;margin:0 auto}
.ins-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.ins-header h2{font-size:1.35rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.ins-header h2 i{color:var(--g3)}
.ins-header p{font-size:.74rem;color:var(--text3);margin-top:3px}
.folio-chip{background:var(--g5);border:1.5px solid #C8E6C9;color:var(--g1);padding:7px 16px;border-radius:30px;font-size:.76rem;font-weight:700;display:flex;align-items:center;gap:6px}

/* ── Selector Vehículo Inteligente ─────────────────── */
.smart-selector{background:var(--surface);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:18px;border:1.5px solid var(--border);box-shadow:var(--shadow-sm)}
.smart-selector-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--g2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.smart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.smart-field{display:flex;flex-direction:column;gap:4px}
.smart-field label{font-size:.63rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.smart-field select,.smart-field input{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.83rem;color:var(--text);outline:none;background:var(--surface);transition:.18s}
.smart-field select:focus,.smart-field input:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.smart-field select:disabled{background:var(--surface2);color:var(--text3)}
.assigned-pill{background:linear-gradient(135deg,var(--g5),#DCEDC8);border:1.5px solid #AED581;border-radius:var(--radius-md);padding:10px 16px;margin-bottom:4px;display:none;align-items:center;gap:10px}
.assigned-pill.show{display:flex}
.assigned-pill i{color:var(--g2);font-size:1rem}
.assigned-pill span{font-size:.8rem;font-weight:700;color:var(--g1)}
.assigned-pill small{font-size:.68rem;color:var(--text3)}

/* ── Tabs ───────────────────────────────────────────── */
.tab-progress{display:flex;background:var(--surface);border-radius:40px;padding:5px;margin-bottom:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border);overflow-x:auto;gap:3px}
.tp-btn{flex:1;min-width:fit-content;padding:8px 12px;border-radius:40px;background:none;border:none;font-family:inherit;font-size:.73rem;font-weight:600;cursor:pointer;color:var(--text3);white-space:nowrap;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tp-btn:hover{background:var(--g5);color:var(--g2)}
.tp-btn.active{background:linear-gradient(135deg,var(--g2),var(--g1));color:white;box-shadow:0 4px 12px rgba(46,125,50,.3)}
.tp-btn.done::after{content:'✓';font-size:.6rem;margin-left:2px;opacity:.7}
.tp-num{width:17px;height:17px;border-radius:50%;background:rgba(255,255,255,.25);font-size:.58rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tp-btn:not(.active) .tp-num{background:var(--border);color:var(--text3)}
.tab-pane{display:none}
.tab-pane.active{display:block;animation:paneIn .22s ease both}
@keyframes paneIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Secciones formulario ───────────────────────────── */
.ins-section{background:var(--surface);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.ins-section-title{font-size:.8rem;font-weight:800;color:var(--g1);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.ins-section-title i{color:var(--g3)}
.f-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.f-grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:.63rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.f input,.f select,.f textarea{padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.84rem;color:var(--text);outline:none;background:var(--surface);transition:.18s}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--g3);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.f input[readonly]{background:var(--surface2);color:var(--text3)}
.f textarea{resize:vertical;min-height:72px}
.span-2{grid-column:span 2}
@media(max-width:600px){.span-2{grid-column:span 1}}

/* ── Estado componentes ─────────────────────────────── */
.cat-section{margin-bottom:18px}
.cat-title{font-size:.72rem;font-weight:800;color:var(--g2);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;padding-left:10px;border-left:3px solid var(--g3);display:flex;align-items:center;gap:6px}
.est-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:7px}
.est-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;transition:.18s}
.est-item:has(.e-btn.active.ok){border-color:#A5D6A7;background:#F1F8E9}
.est-item:has(.e-btn.active.reg){border-color:#FFE082;background:#FFFDE7}
.est-item:has(.e-btn.active.mal){border-color:#EF9A9A;background:#FFF5F5}
.est-item span{font-size:.76rem;font-weight:500;color:var(--text)}
.est-btns{display:flex;gap:3px}
.e-btn{padding:4px 9px;border-radius:20px;border:1.5px solid var(--border);font-size:.65rem;font-weight:800;cursor:pointer;background:var(--surface);color:var(--text3);transition:.18s;font-family:inherit}
.e-btn.ok.active{background:var(--g2);color:white;border-color:var(--g2)}
.e-btn.reg.active{background:#F9A825;color:white;border-color:#F9A825}
.e-btn.mal.active{background:var(--red);color:white;border-color:var(--red)}

/* ── Foto alerta (cuando hay falla) ────────────────── */
.foto-alerta-wrap{display:none;margin-top:8px;padding:10px;background:#FFF5F5;border:1.5px solid #FFCDD2;border-radius:var(--radius-sm);animation:paneIn .2s ease}
.foto-alerta-wrap.show{display:block}
.foto-alerta-label{font-size:.68rem;color:var(--red);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.foto-alerta-input{display:flex;gap:8px;align-items:center}
.foto-alerta-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;border:1px solid var(--border);display:none}

/* ── Mantenimiento chips ────────────────────────────── */
.mantto-cat{background:var(--surface2);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:10px;border:1px solid var(--border)}
.mantto-cat h4{font-size:.7rem;font-weight:800;color:var(--g1);margin-bottom:9px;text-transform:uppercase;letter-spacing:.5px}
.mantto-items{display:flex;flex-wrap:wrap;gap:7px}
.mantto-label{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:.74rem;font-weight:600;color:var(--text2);transition:.18s;user-select:none}
.mantto-label:hover{border-color:var(--g3);color:var(--g2);background:var(--g5)}
.mantto-label input{position:absolute;opacity:0;pointer-events:none}
.mantto-label:has(input:checked){background:var(--g2);color:white;border-color:var(--g2)}

/* ── Fotos generales ────────────────────────────────── */
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.foto-slot{aspect-ratio:1;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px dashed var(--border);overflow:hidden;position:relative;transition:.2s}
.foto-slot:hover{border-color:var(--g3);background:var(--g5)}
.foto-slot.has-photo{border-style:solid;border-color:var(--g3)}
.foto-preview{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text3);font-size:.65rem;text-align:center;padding:6px}
.foto-preview i{font-size:1.3rem}
.foto-slot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}

/* ── GPS ────────────────────────────────────────────── */
.gps-box{background:var(--surface2);border-radius:var(--radius-lg);padding:20px;text-align:center;border:1.5px solid var(--border)}
.gps-icon{font-size:2.2rem;color:var(--g3);margin-bottom:10px;display:block}
#gpsCoordsDisplay{font-family:monospace;font-size:.83rem;color:var(--text2);margin:8px 0 16px;font-weight:600}
.gps-coords-ok{color:var(--g2)!important}

/* ── Action bar ─────────────────────────────────────── */
.action-bar{position:sticky;bottom:16px;background:var(--surface);border-radius:50px;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:18px;box-shadow:0 8px 32px rgba(0,0,0,.15);border:1px solid var(--border);z-index:50}
.sync-status{font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:6px}
.sync-status i{color:var(--g3)}
.action-btns{display:flex;gap:8px}
</style>

<div class="ins-wrap">
  <!-- Header -->
  <div class="ins-header">
    <div>
      <h2><i class="fas fa-clipboard-list"></i> Inspección Vehicular</h2>
      <p>Registro completo del estado de la unidad · PDF y Drive automáticos</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="folio-chip"><i class="fas fa-hashtag"></i> <span id="folioDisplay">—</span></div>
      <button class="btn-secondary" onclick="nuevaInspeccion()" style="padding:8px 14px;font-size:.73rem">
        <i class="fas fa-plus"></i> Nueva
      </button>
    </div>
  </div>

  <!-- Vehículo asignado automático -->
  <div class="assigned-pill" id="assignedPill">
    <i class="fas fa-truck"></i>
    <div>
      <span id="assignedPlacasText">—</span>
      <br><small id="assignedModeloText">Vehículo asignado a tu usuario</small>
    </div>
    <button class="btn-secondary" style="padding:5px 12px;font-size:.7rem;margin-left:auto" onclick="usarVehiculoAsignado()">
      <i class="fas fa-check"></i> Usar este
    </button>
  </div>

  <!-- Selector inteligente de vehículo -->
  <div class="smart-selector">
    <div class="smart-selector-title"><i class="fas fa-sliders"></i> Seleccionar vehículo</div>
    <div class="smart-grid">
      <div class="smart-field">
        <label>Desde catálogo</label>
        <select id="vehiculoSelector" onchange="cargarDatosVehiculo()">
          <option value="">— Seleccione unidad —</option>
        </select>
      </div>
      <div class="smart-field">
        <label>Marca</label>
        <select id="smMarca" onchange="onMarcaChange()">
          <option value="">— Marca —</option>
          <option value="RAM">RAM</option>
          <option value="Ford">Ford</option>
          <option value="Chevrolet">Chevrolet</option>
          <option value="Freightliner">Freightliner</option>
        </select>
      </div>
      <div class="smart-field">
        <label>Modelo</label>
        <select id="smModelo" onchange="onModeloChange()" disabled>
          <option value="">— Modelo —</option>
        </select>
      </div>
      <div class="smart-field">
        <label>Versión</label>
        <select id="smVersion" onchange="onVersionChange()" disabled>
          <option value="">— Versión —</option>
        </select>
      </div>
    </div>
    <p style="font-size:.67rem;color:var(--text3);margin-top:8px">
      <i class="fas fa-info-circle"></i> Selecciona desde catálogo o usa el selector por marca/modelo para autocompletar
    </p>
  </div>

  <!-- Tabs de progreso -->
  <div class="tab-progress" id="tabProgress">
    <button class="tp-btn active" data-tab="vehiculo"><span class="tp-num">1</span><i class="fas fa-truck"></i> Vehículo</button>
    <button class="tp-btn" data-tab="responsable"><span class="tp-num">2</span><i class="fas fa-user"></i> Responsable</button>
    <button class="tp-btn" data-tab="estado"><span class="tp-num">3</span><i class="fas fa-clipboard-check"></i> Estado</button>
    <button class="tp-btn" data-tab="mantenimiento"><span class="tp-num">4</span><i class="fas fa-wrench"></i> Mant.</button>
    <button class="tp-btn" data-tab="fotos"><span class="tp-num">5</span><i class="fas fa-camera"></i> Fotos</button>
    <button class="tp-btn" data-tab="gps"><span class="tp-num">6</span><i class="fas fa-map-pin"></i> GPS</button>
  </div>

  <div id="inspeccionContent">
    <div style="text-align:center;padding:60px;color:var(--text3)">
      <i class="fas fa-spinner fa-spin" style="font-size:1.8rem;color:var(--g3)"></i>
      <p style="margin-top:12px;font-size:.83rem">Cargando formulario…</p>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <div class="sync-status" id="syncStatus"><i class="fas fa-circle-check"></i> Listo para guardar</div>
    <div class="action-btns">
      <button class="btn-secondary" id="btnPDFPreview" onclick="descargarPDF(false)" style="padding:9px 14px;font-size:.76rem">
        <i class="fas fa-file-pdf"></i> PDF
      </button>
      <button class="btn-primary" id="btnGuardarInspeccion" onclick="guardarInspeccionCompleta()">
        <i class="fas fa-save"></i> Guardar y subir Drive
      </button>
    </div>
  </div>
</div>

// ── Estado global ──────────────────────────────────────────
let currentFolio   = null;
let gpsData        = null;
let fotosData      = { principales: [], danios: [] };
let fotosAlertas   = {}; // componente → base64
let activeTab      = 'vehiculo';
let editingFolio   = sessionStorage.getItem('editarFolio');
let vehiculosGlobal = [];
let vehAsignado    = null;

// ── Verificar vehículo asignado ────────────────────────────
function checkVehiculoAsignado() {
  const session = window.currentUser || JSON.parse(localStorage.getItem('prodeni_session') || '{}');
  if (session.vehiculoAsignado) {
    vehAsignado = session.vehiculoAsignado;
    document.getElementById('assignedPill').classList.add('show');
    document.getElementById('assignedPlacasText').textContent = session.vehiculoAsignado;
    // Buscar datos del vehículo en cache
    const vehiculos = JSON.parse(localStorage.getItem('prodeni_vehiculos_cache') || '[]');
    const v = vehiculos.find(x => x.placas === session.vehiculoAsignado);
    if (v) {
      document.getElementById('assignedModeloText').textContent = [v.marca, v.modelo, v.version].filter(Boolean).join(' ');
    }
  }
}

window.usarVehiculoAsignado = function() {
  if (!vehAsignado) return;
  const sel = document.getElementById('vehiculoSelector');
  // Buscar en el select
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === vehAsignado) {
      sel.value = vehAsignado;
      cargarDatosVehiculo();
      window.toast('Vehículo asignado cargado ✓', 'success');
      return;
    }
  }
  // Si no está en el select, cargar desde cache
  const vehiculos = JSON.parse(localStorage.getItem('prodeni_vehiculos_cache') || '[]');
  const v = vehiculos.find(x => x.placas === vehAsignado);
  if (v) llenarCamposVehiculo(v);
};

// ── Dropdown inteligente por marca ─────────────────────────
window.onMarcaChange = function() {
  const marca    = document.getElementById('smMarca').value;
  const selMod   = document.getElementById('smModelo');
  const selVer   = document.getElementById('smVersion');
  selMod.innerHTML = '<option value="">— Modelo —</option>';
  selVer.innerHTML = '<option value="">— Versión —</option>';
  selMod.disabled = !marca;
  selVer.disabled = true;
  if (!marca) return;
  const modelos = Object.keys(CATALOGO_VEHICULOS[marca] || {});
  modelos.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; selMod.appendChild(o); });
};

window.onModeloChange = function() {
  const marca  = document.getElementById('smMarca').value;
  const modelo = document.getElementById('smModelo').value;
  const selVer = document.getElementById('smVersion');
  selVer.innerHTML = '<option value="">— Versión —</option>';
  selVer.disabled = !modelo;
  if (!marca || !modelo) return;
  const data = CATALOGO_VEHICULOS[marca]?.[modelo];
  if (!data) return;
  data.versiones.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; selVer.appendChild(o); });
};

window.onVersionChange = function() {
  const marca   = document.getElementById('smMarca').value;
  const modelo  = document.getElementById('smModelo').value;
  const version = document.getElementById('smVersion').value;
  if (!marca || !modelo || !version) return;
  const data  = CATALOGO_VEHICULOS[marca]?.[modelo];
  const anios = data?.anios || [];

  // Autocompletar campos del formulario
  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  setVal('marca',   marca);
  setVal('modelo',  modelo);
  setVal('version', version);
  if (anios.length) setVal('anio', anios[anios.length - 1]);

  window.toast(`${marca} ${modelo} ${version} cargado ✓`, 'success');
};

// ── Folio ──────────────────────────────────────────────────
function generarFolio() {
  const now    = new Date();
  const pad    = n => String(n).padStart(2, '0');
  currentFolio = `INS-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  const el = document.getElementById('folioDisplay');
  if (el) el.textContent = currentFolio;
}

// ── Cargar catálogo de vehículos en el selector ────────────
async function cargarCatalogoSelector() {
  const sel = document.getElementById('vehiculoSelector');
  vehiculosGlobal = JSON.parse(localStorage.getItem('prodeni_vehiculos_cache') || '[]');

  // Intentar actualizar desde servidor
  if (navigator.onLine) {
    try {
      const r = await fetch(`${window.SCRIPT_URL}?action=getVehiculos`);
      const d = await r.json();
      if (d.success) { vehiculosGlobal = d.vehiculos; localStorage.setItem('prodeni_vehiculos_cache', JSON.stringify(vehiculosGlobal)); }
    } catch(e) {}
  }

  vehiculosGlobal.filter(v => (v.activo || 'SI') === 'SI').forEach(v => {
    const o = document.createElement('option');
    o.value = v.placas;
    o.textContent = `${v.placas}${v.economico ? ' · ' + v.economico : ''} — ${[v.marca, v.modelo].filter(Boolean).join(' ')} ${v.conductor ? '(' + v.conductor + ')' : ''}`;
    sel.appendChild(o);
  });
}

window.cargarDatosVehiculo = function() {
  const placas = document.getElementById('vehiculoSelector').value;
  if (!placas) return;
  const v = vehiculosGlobal.find(x => x.placas === placas);
  if (v) llenarCamposVehiculo(v);
};

function llenarCamposVehiculo(v) {
  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  setVal('placas',    v.placas);
  setVal('economico', v.economico);
  setVal('marca',     v.marca);
  setVal('modelo',    v.modelo);
  setVal('version',   v.version);
  setVal('anio',      v.anio);
  setVal('color',     v.color);
  setVal('vin',       v.vin);
  setVal('conductor', v.conductor);
  setVal('ruta',      v.ruta);
  // Sincronizar selector de marca/modelo también
  const sm = document.getElementById('smMarca');
  if (sm && v.marca) { sm.value = v.marca; onMarcaChange(); }
  window.toast(`Datos de ${v.placas} cargados ✓`, 'success');
}

function calcProxKm() {
  const actual   = parseInt(document.getElementById('kmActual')?.value) || 0;
  const anterior = parseInt(document.getElementById('kmUltimoServ')?.value) || 0;
  if (actual && anterior) {
    const diff = actual - anterior;
    const el   = document.getElementById('kmProxServ');
    if (el) el.value = actual + Math.max(5000, diff);
  }
}

function renderSlots(containerId, labels, tipo) {
  const cont = document.getElementById(containerId);
  if (!cont) return;
  cont.innerHTML = labels.map((lbl, i) => `
    <div class="foto-slot" id="slot_${tipo}_${i}" onclick="triggerFoto('${tipo}','${lbl}',${i})">
      <img id="img_${tipo}_${i}" style="display:none">

      </div>
    </div>
    <input type="file" accept="image/*" capture="environment" id="file_${tipo}_${i}" style="display:none"

  `).join('');
}

window.triggerFoto = (tipo, lbl, i) => document.getElementById(`file_${tipo}_${i}`)?.click();

window.onFotoSelected = function(tipo, lbl, i, input) {
  const f = input.files[0];
  if (!f) return;
  comprimirImagen(f, 0.65, 900, (b64) => {
    const img  = document.getElementById(`img_${tipo}_${i}`);
    const prev = document.getElementById(`prev_${tipo}_${i}`);
    const slot = document.getElementById(`slot_${tipo}_${i}`);
    if (img)  { img.src = b64; img.style.display = 'block'; }
    if (prev) prev.style.display = 'none';
    if (slot) slot.classList.add('has-photo');
    const arr = tipo === 'principal' ? (fotosData.principales) : (fotosData.danios);
    arr[i] = { label: lbl, data: b64 };
    window.toast(`Foto "${lbl}" capturada ✓`, 'success');
  });
};

function comprimirImagen(file, quality, maxW, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img    = new Image();
    img.onload   = () => {
      const ratio  = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * ratio;
      canvas.height= img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

window.capturarGPS = function() {
  if (!navigator.geolocation) { window.toast('GPS no disponible', 'error'); return; }
  window.toast('Obteniendo ubicación…', 'info');
  navigator.geolocation.getCurrentPosition(
    pos => {
      gpsData = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      const el = document.getElementById('gpsCoordsDisplay');
      if (el) { el.textContent = `${gpsData.lat.toFixed(6)}, ${gpsData.lon.toFixed(6)}`; el.className = 'gps-coords-ok'; }
      window.toast('GPS capturado ✓', 'success');
    },
    err => window.toast('Error GPS: ' + err.message, 'error'),
    { enableHighAccuracy: true, timeout: 10000 }
  );
};

function bindTabs() {
  document.querySelectorAll('.tp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tp-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const pane = document.getElementById(`tab-${tab}`);
      if (pane) pane.classList.add('active');
      activeTab = tab;
    });
  });
}

// ── Cargar inspección existente ────────────────────────────
async function cargarInspeccionExistente(folio) {
  if (!navigator.onLine) return;
  try {
    const r = await fetch(`${window.SCRIPT_URL}?action=getInspeccion&folio=${folio}`);
    const d = await r.json();
    if (d.success && d.inspeccion) {
      const ins = d.inspeccion;
      const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      ['marca','modelo','version','anio','color','placas','economico','vin',
       'kmActual','kmUltimoServ','kmProxServ','conductor','ruta','dictamen',
       'fallaDetectada','accionCorrectiva','obsGenerales'].forEach(f => setVal(f, ins[f]));
      if (ins.estados) {
        Object.entries(ins.estados).forEach(([item, val]) => {
          const btn = document.querySelector(`.e-btn[data-item="${item}"][data-val="${val}"]`);
          if (btn) btn.click();
        });
      }
      currentFolio = folio;
      document.getElementById('folioDisplay').textContent = folio;
      window.toast('Inspección cargada para edición', 'success');
    }
  } catch(e) {}
}

// ── Generar PDF con jsPDF ──────────────────────────────────
async function generarPDFBlob() {
  // Cargar jsPDF si no existe
  if (!window.jspdf) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
  const W   = 210;
  const M   = 14;
  let   y   = 0;

  const addLine = () => { pdf.setDrawColor(220); pdf.line(M, y, W - M, y); y += 4; };
  const title   = (t, s = 11) => { pdf.setFontSize(s); pdf.setFont(undefined,'bold'); pdf.setTextColor(27,94,32); pdf.text(t, M, y); y += 6; pdf.setFont(undefined,'normal'); pdf.setTextColor(30,30,30); };
  const row     = (l, v, x2 = 110) => { pdf.setFontSize(8); pdf.setFont(undefined,'bold'); pdf.text(l + ':', M, y); pdf.setFont(undefined,'normal'); pdf.text(String(v || '—'), x2, y); y += 5; };
  const row2    = (l1, v1, l2, v2) => { pdf.setFontSize(8); pdf.setFont(undefined,'bold'); pdf.text(l1 + ':', M, y); pdf.setFont(undefined,'normal'); pdf.text(String(v1 || '—'), 60, y); pdf.setFont(undefined,'bold'); pdf.text(l2 + ':', 110, y); pdf.setFont(undefined,'normal'); pdf.text(String(v2 || '—'), 165, y); y += 5; };

  // ── ENCABEZADO ──
  pdf.setFillColor(27, 94, 32);
  pdf.rect(0, 0, W, 28, 'F');
  pdf.setTextColor(212, 175, 55);
  pdf.setFontSize(16); pdf.setFont(undefined,'bold');
  pdf.text('PRODENI Fleet', M, 11);
  pdf.setFontSize(9); pdf.setFont(undefined,'normal'); pdf.setTextColor(255,255,255);
  pdf.text('Control Vehicular — Reporte de Inspección', M, 17);
  pdf.setFontSize(8);
  pdf.text(`Folio: ${currentFolio || '—'}`, M, 22);
  pdf.text(`Fecha: ${new Date().toLocaleDateString('es-MX')}`, 120, 22);
  y = 34;

  // ── DATOS VEHÍCULO ──
  const g = id => document.getElementById(id)?.value || '';
  title('DATOS DEL VEHÍCULO');
  addLine();
  row2('Placas', g('placas'), 'Económico', g('economico'));
  row2('Marca', g('marca'), 'Modelo', g('modelo'));
  row2('Versión', g('version'), 'Año', g('anio'));
  row2('Color', g('color'), 'VIN', g('vin'));
  row2('Km actual', g('kmActual'), 'Km próximo serv.', g('kmProxServ'));
  y += 2;

  // ── RESPONSABLE ──
  title('RESPONSABLE Y DICTAMEN');
  addLine();
  row('Conductor', g('conductor'));
  row('Ruta', g('ruta'));
  row('Inspector', (window.currentUser || {}).username || '—');

  // Dictamen con color
  const dictamen = g('dictamen') || '—';
  pdf.setFontSize(9); pdf.setFont(undefined,'bold');
  pdf.text('Dictamen:', M, y);
  const dictColor = dictamen.includes('No apto') ? [198,40,40] : dictamen.includes('observaciones') ? [230,81,0] : [27,94,32];
  pdf.setTextColor(...dictColor);
  pdf.text(dictamen, 45, y);
  pdf.setTextColor(30,30,30); y += 7;

  // ── ESTADOS ──
  const estados = obtenerEstados();
  if (Object.keys(estados).length) {
    if (y > 240) { pdf.addPage(); y = 14; }
    title('ESTADO DE COMPONENTES');
    addLine();
    Object.entries(estados).forEach(([item, val]) => {
      const color = val === 'ok' ? [27,94,32] : val === 'reg' ? [230,81,0] : [198,40,40];
      pdf.setFontSize(8); pdf.setFont(undefined,'normal'); pdf.setTextColor(30,30,30);
      pdf.text(item + ':', M, y);
      pdf.setFont(undefined,'bold'); pdf.setTextColor(...color);
      pdf.text(val.toUpperCase(), 100, y);
      pdf.setTextColor(30,30,30); pdf.setFont(undefined,'normal');
      y += 4.5;
      if (y > 270) { pdf.addPage(); y = 14; }
    });
    y += 3;
  }

  // ── FALLAS ──
  const falla = g('fallaDetectada');
  if (falla) {
    if (y > 240) { pdf.addPage(); y = 14; }
    title('FALLA DETECTADA', 10);
    addLine();
    pdf.setFontSize(8); pdf.setTextColor(198,40,40);
    const fallaLines = pdf.splitTextToSize(falla, W - M*2);
    pdf.text(fallaLines, M, y);
    y += fallaLines.length * 4 + 3;
    pdf.setTextColor(30,30,30);
    const accion = g('accionCorrectiva');
    if (accion) {
      pdf.setFont(undefined,'bold'); pdf.text('Acción correctiva:', M, y); y += 4;
      pdf.setFont(undefined,'normal');
      const accionLines = pdf.splitTextToSize(accion, W - M*2);
      pdf.text(accionLines, M, y); y += accionLines.length * 4 + 3;
    }
  }

  // ── SERVICIOS ──
  const servicios = obtenerServicios();
  if (servicios.length) {
    if (y > 240) { pdf.addPage(); y = 14; }
    title('SERVICIOS REALIZADOS', 10);
    addLine();
    servicios.forEach(s => { pdf.setFontSize(8); pdf.text('✓ ' + s, M, y); y += 4.5; });
    y += 3;
  }

  // ── OBS GENERALES ──
  const obs = g('obsGenerales');
  if (obs) {
    if (y > 240) { pdf.addPage(); y = 14; }
    title('OBSERVACIONES', 10);
    addLine();
    pdf.setFontSize(8);
    const obsLines = pdf.splitTextToSize(obs, W - M*2);
    pdf.text(obsLines, M, y); y += obsLines.length * 4 + 3;
  }

  // ── GPS ──
  if (gpsData) {
    if (y > 255) { pdf.addPage(); y = 14; }
    title('UBICACIÓN GPS', 10);
    addLine();
    row('Coordenadas', `${gpsData.lat.toFixed(6)}, ${gpsData.lon.toFixed(6)}`);
  }

  // ── FOTOS THUMBNAIL (primeras 4) ──
  const todasFotos = obtenerTodasFotos().slice(0, 4);
  if (todasFotos.length) {
    pdf.addPage(); y = 14;
    title('REGISTRO FOTOGRÁFICO');
    addLine();
    const imgW = 85; const imgH = 60;
    for (let i = 0; i < todasFotos.length; i++) {
      const col = i % 2;
      const row_n = Math.floor(i / 2);
      const x = M + col * (imgW + 6);
      const iy = y + row_n * (imgH + 10);
      try {
        pdf.addImage(todasFotos[i].data, 'JPEG', x, iy, imgW, imgH);
        pdf.setFontSize(7); pdf.setTextColor(100,100,100);
        pdf.text(todasFotos[i].label || `Foto ${i+1}`, x, iy + imgH + 3);
      } catch(e) {}
    }
  }

  // ── PIE ──
  const pages = pdf.getNumberOfPages();
  for (let p = 1; p <= pages; p++) {
    pdf.setPage(p);
    pdf.setFontSize(7); pdf.setTextColor(160,160,160);
    pdf.text(`PRODENI Fleet — ${currentFolio} · Pág. ${p}/${pages}`, M, 293);
    pdf.text(`Generado: ${new Date().toLocaleString('es-MX')}`, W - M, 293, { align: 'right' });
  }

  return pdf.output('datauristring');
}

// ── Descargar PDF local ────────────────────────────────────
window.descargarPDF = async function(silencioso = false) {
  if (!silencioso) window.toast('Generando PDF…', 'info');
  try {
    const datauri = await generarPDFBlob();
    const link    = document.createElement('a');
    link.href     = datauri;
    link.download = `Inspeccion_${currentFolio || 'PRODENI'}.pdf`;
    link.click();
    if (!silencioso) window.toast('PDF descargado ✓', 'success');
    return datauri;
  } catch(e) {
    if (!silencioso) window.toast('Error generando PDF: ' + e.message, 'error');
    return null;
  }
};

// ── Guardar inspección + Drive + Sheet ────────────────────
window.guardarInspeccionCompleta = async function() {
  const placas   = document.getElementById('placas')?.value.trim().toUpperCase();
  const kmActual = document.getElementById('kmActual')?.value;
  if (!placas)   { window.toast('Las placas son obligatorias', 'error');   return; }
  if (!kmActual) { window.toast('El kilometraje es obligatorio', 'error'); return; }

  const syncEl = document.getElementById('syncStatus');
  const btn    = document.getElementById('btnGuardarInspeccion');
  if (syncEl) syncEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando…';
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando…'; }

  const g = id => document.getElementById(id)?.value || '';

  // Generar PDF
  let pdfBase64 = '';
  try {
    const raw = await generarPDFBlob();
    pdfBase64 = raw ? raw.replace(/^data:application\/pdf;base64,/, '') : '';
  } catch(e) {}

  // Fotos de alerta comprimidas
  const fotosAlertaArr = Object.entries(fotosAlertas).map(([componente, data]) => ({ label: 'ALERTA_' + componente, data }));

  const datos = {
    action: 'saveInspeccion',
    folio:  currentFolio,
    fecha:  new Date().toISOString().slice(0, 10),
    usuario: (window.currentUser || {}).username || '',
    marca: g('marca'), modelo: g('modelo'), version: g('version'),
    anio: g('anio'), color: g('color'), placas: placas,
    economico: g('economico'), vin: g('vin'), kmActual: kmActual,
    kmUltimoServ: g('kmUltimoServ'), kmProxServ: g('kmProxServ'),
    conductor: g('conductor'), ruta: g('ruta'), dictamen: g('dictamen'),
    estados:  obtenerEstados(),
    serviciosRealizados: obtenerServicios(),
    fallaDetectada:  g('fallaDetectada'),
    accionCorrectiva: g('accionCorrectiva'),
    obsGenerales: g('obsGenerales'),
    fotos: [...obtenerTodasFotos(), ...fotosAlertaArr],
    pdfBase64: pdfBase64,
    lat: gpsData?.lat || '', lon: gpsData?.lon || '',
    timestamp: Date.now()
  };

  // Guardar localmente como respaldo
  const pendientes = JSON.parse(localStorage.getItem('prodeni_pendientes') || '[]');
  pendientes.push({ ts: Date.now(), data: { ...datos, pdfBase64: '' } }); // sin PDF en cache local
  localStorage.setItem('prodeni_pendientes', JSON.stringify(pendientes));

  if (syncEl) syncEl.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Subiendo a Drive…';

  // Sincronizar con servidor
  if (navigator.onLine) {
    try {
      const response = await fetch(window.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      const result = await response.json();
      if (result.success) {
        // Limpiar del pendientes
        const nuevosPend = JSON.parse(localStorage.getItem('prodeni_pendientes') || '[]')
          .filter(p => p.data.folio !== currentFolio);
        localStorage.setItem('prodeni_pendientes', JSON.stringify(nuevosPend));

        if (syncEl) syncEl.innerHTML = `<i class="fas fa-circle-check"></i> Guardado en Drive ✓`;
        const pdfUrl = result.pdfUrl || '';
        window.toast(
          pdfUrl ? `Inspección guardada y PDF subido a Drive ✓` : 'Guardado en el sistema ✓',
          'success'
        );

        // Subir fotos de alerta por separado si hay componentes en mal estado
        const fotosAlertaKeys = Object.keys(fotosAlertas);
        if (fotosAlertaKeys.length) {
          for (const comp of fotosAlertaKeys) {
            fetch(window.SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                action: 'saveFotoAlerta',
                folio: currentFolio,
                placas: placas,
                componente: comp,
                fotoBase64: fotosAlertas[comp].replace(/^data:image\/\w+;base64,/, ''),
                usuario: (window.currentUser || {}).username || ''
              })
            }).catch(() => {});
          }
          window.toast(`${fotosAlertaKeys.length} foto(s) de alerta enviadas al administrador`, 'warn');
        }

      } else {
        window.toast('Guardado offline. Se sincronizará al conectar.', 'warn');
        if (syncEl) syncEl.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Pendiente de sincronizar';
      }
    } catch(e) {
      window.toast('Sin conexión. Se guardó localmente.', 'warn');
      if (syncEl) syncEl.innerHTML = '<i class="fas fa-wifi-slash"></i> Guardado offline';
    }
  } else {
    window.toast('Sin conexión. Se guardó localmente.', 'warn');
    if (syncEl) syncEl.innerHTML = '<i class="fas fa-wifi-slash"></i> Guardado offline';
  }

  if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Guardar y subir Drive'; }

  setTimeout(() => {
    if (confirm('¿Iniciar una nueva inspección?')) nuevaInspeccion();
  }, 1200);
};

window.nuevaInspeccion = function() {
  editingFolio = null;
  fotosData    = { principales: [], danios: [] };
  fotosAlertas = {};
  gpsData      = null;
  generarFolio();
  cargarFormulario();
};

// Inicializar
window.cargarFormulario = window.cargarFormulario || cargarFormulario;
cargarFormulario();
})();
</script>
