<!-- modules/checklist.html -->
<style>
.chk-header{margin-bottom:24px}
.chk-header h2{font-size:1.4rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.chk-header h2 i{color:var(--g3)}
.chk-header p{font-size:.76rem;color:var(--text3);margin-top:3px}
.chk-info-bar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.chk-info-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px 20px;border:1px solid var(--border);box-shadow:var(--shadow-sm);flex:1;min-width:180px}
.chk-info-lbl{font-size:.65rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.chk-info-val{font-size:1rem;font-weight:800;color:var(--text)}
.chk-info-val.green{color:var(--g2)}
.chk-date{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text2)}
.chk-date i{color:var(--g3)}
.chk-panel{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:20px}
.chk-panel-head{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;justify-content:space-between;align-items:center}
.chk-panel-title{font-size:.83rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.chk-panel-title i{color:var(--g2)}
.chk-panel-badge{font-size:.7rem;background:var(--g5);color:var(--g2);padding:3px 10px;border-radius:20px;font-weight:700}
.chk-grid{padding:16px 20px;display:grid;gap:8px}
.chk-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface2);border-radius:var(--radius-sm);border:1.5px solid var(--border);transition:.2s;cursor:pointer;user-select:none}
.chk-item:hover{border-color:var(--g4);background:var(--g5)}
.chk-item.checked{border-color:#A5D6A7;background:#F1F8E9}
.chk-item.checked .chk-box{background:var(--g2);border-color:var(--g2);color:white}
.chk-item.failed{border-color:#EF9A9A;background:#FFF5F5}
.chk-item.failed .chk-box{background:var(--red);border-color:var(--red);color:white}
.chk-box{width:28px;height:28px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;transition:.2s;background:var(--surface)}
.chk-label{flex:1}
.chk-label-text{font-size:.83rem;font-weight:600;color:var(--text)}
.chk-label-sub{font-size:.7rem;color:var(--text3);margin-top:2px}
.chk-status-btns{display:flex;gap:4px;flex-shrink:0}
.chk-status-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);font-size:.65rem;font-weight:800;cursor:pointer;background:var(--surface);color:var(--text3);transition:.18s;font-family:inherit}
.chk-status-btn:hover{transform:scale(1.05)}
.chk-status-btn.ok-active{background:var(--g2);color:white;border-color:var(--g2)}
.chk-status-btn.mal-active{background:var(--red);color:white;border-color:var(--red)}
.chk-obs-field{margin-top:6px;display:none}
.chk-item.failed .chk-obs-field{display:block}
.chk-obs-field textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.78rem;resize:vertical;min-height:50px;outline:none}
.chk-obs-field textarea:focus{border-color:var(--g3)}
.chk-photo-btn{margin-top:6px;display:none;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:inherit;font-size:.7rem;font-weight:700;cursor:pointer;color:var(--text2);transition:.18s}
.chk-item.failed .chk-photo-btn{display:inline-flex;align-items:center;gap:5px}
.chk-photo-btn:hover{background:var(--g5);border-color:var(--g3);color:var(--g2)}
.chk-summary{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:20px;margin-bottom:20px}
.chk-progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:12px 0}
.chk-progress-fill{height:100%;border-radius:4px;transition:width .4s ease;background:linear-gradient(90deg,var(--g3),var(--g2))}
.chk-progress-text{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text3);font-weight:600}
.chk-action-bar{position:sticky;bottom:20px;background:var(--surface);border-radius:60px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,.14);border:1px solid var(--border);z-index:50}
.chk-history{padding:16px 20px}
.chk-hist-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center;flex-wrap:wrap}
.chk-hist-row:last-child{border-bottom:none}
.chk-hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.chk-hist-dot.complete{background:var(--g3)}
.chk-hist-dot.issues{background:#FFA726}
.chk-hist-body{flex:1}
.chk-hist-date{font-size:.82rem;font-weight:700;color:var(--text)}
.chk-hist-sub{font-size:.72rem;color:var(--text3);margin-top:2px}
.chk-hist-badge{font-size:.65rem;padding:3px 10px;border-radius:20px;font-weight:700}
.chk-hist-badge.ok{background:#E8F5E9;color:#1B5E20}
.chk-hist-badge.warn{background:#FFF8E1;color:#E65100}
</style>

<div style="max-width:900px;margin:0 auto">
  <div class="chk-header">
    <h2><i class="fas fa-list-check"></i> Checklist Diario</h2>
    <p>Revisión diaria del vehículo antes de operar. Complete todos los puntos.</p>
  </div>

  <div class="chk-info-bar">
    <div class="chk-info-card">
      <div class="chk-info-lbl">Conductor</div>
      <div class="chk-info-val" id="chkConductor">—</div>
    </div>
    <div class="chk-info-card">
      <div class="chk-info-lbl">Vehículo asignado</div>
      <div class="chk-info-val green" id="chkVehiculo">—</div>
    </div>
    <div class="chk-info-card">
      <div class="chk-info-lbl">Fecha</div>
      <div class="chk-date"><i class="fas fa-calendar-day"></i> <span id="chkFecha">—</span></div>
    </div>
    <div class="chk-info-card">
      <div class="chk-info-lbl">Km odómetro</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" id="chkKm" placeholder="Km actual" style="padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;width:120px;outline:none">
      </div>
    </div>
  </div>

  <div class="chk-summary" id="chkSummary">
    <div class="chk-progress-text">
      <span id="chkProgressLabel">0 de 15 verificados</span>
      <span id="chkProgressPct">0%</span>
    </div>
    <div class="chk-progress-bar"><div class="chk-progress-fill" id="chkProgressBar" style="width:0%"></div></div>
  </div>

  <div id="chkPanels"></div>

  <div class="chk-action-bar">
    <div style="font-size:.72rem;color:var(--text3);display:flex;align-items:center;gap:6px" id="chkSyncStatus"><i class="fas fa-circle-check"></i> Listo</div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" onclick="verHistorialChecklist()" style="padding:8px 16px;font-size:.76rem"><i class="fas fa-history"></i> Historial</button>
      <button class="btn-primary" onclick="guardarChecklist()"><i class="fas fa-save"></i> Firmar y guardar</button>
    </div>
  </div>

  <!-- Panel historial -->
  <div class="chk-panel" id="chkHistorialPanel" style="display:none">
    <div class="chk-panel-head">
      <span class="chk-panel-title"><i class="fas fa-clock-rotate-left"></i> Historial de checklists</span>
      <span class="chk-panel-badge" id="chkHistCount">0</span>
    </div>
    <div class="chk-history" id="chkHistorialList">
      <div style="text-align:center;padding:30px;color:var(--text3);font-size:.82rem">Sin registros</div>
    </div>
  </div>
</div>

<script>
(function(){

const CHECKLIST_ITEMS = {
  'Fluidos y motor': [
    { id: 'aceite', label: 'Nivel de aceite motor', sub: 'Verificar con varilla en frío' },
    { id: 'agua', label: 'Nivel de agua/refrigerante', sub: 'No abrir radiador en caliente' },
    { id: 'combustible', label: 'Nivel de combustible', sub: 'Mínimo 1/4 de tanque' }
  ],
  'Llantas y frenos': [
    { id: 'llantas_presion', label: 'Presión de llantas', sub: 'Revisión visual y golpe lateral' },
    { id: 'llantas_desgaste', label: 'Desgaste de llantas', sub: 'Profundidad mínima del dibujo' },
    { id: 'frenos', label: 'Frenos (pedal firme)', sub: 'Verificar que no se hunda el pedal' }
  ],
  'Luces y señalización': [
    { id: 'luces_del', label: 'Luces delanteras (altas/bajas)', sub: 'Ambos faros funcionales' },
    { id: 'luces_tras', label: 'Luces traseras y freno', sub: 'Calaveras y luces de freno' },
    { id: 'direccionales', label: 'Direccionales e intermitentes', sub: 'Izquierda, derecha, cuatro' },
    { id: 'luces_reversa', label: 'Luces de reversa', sub: 'Funcionamiento correcto' }
  ],
  'Seguridad': [
    { id: 'cinturon', label: 'Cinturón de seguridad', sub: 'Ajuste y seguro correcto' },
    { id: 'espejos', label: 'Espejos retrovisores', sub: 'Laterales y central ajustados' },
    { id: 'limpiabrisas', label: 'Limpiaparabrisas', sub: 'Plumas en buen estado y con líquido' },
    { id: 'extintor', label: 'Extintor vigente', sub: 'Verificar carga y accesibilidad' },
    { id: 'triangulos', label: 'Triángulos de seguridad', sub: 'Presentes y accesibles' }
  ],
  'Documentos': [
    { id: 'tarjeta_circ', label: 'Tarjeta de circulación', sub: 'Vigente y dentro del vehículo' },
    { id: 'poliza_seguro', label: 'Póliza de seguro', sub: 'Vigente' },
    { id: 'licencia', label: 'Licencia de conducir', sub: 'Vigente y tipo correcto' }
  ]
};

let checklistState = {};
let checklistPhotos = {};

function initChecklist() {
  const user = window.currentUser || {};
  const hoy = new Date();

  document.getElementById('chkConductor').textContent = user.username || 'Sin sesión';
  document.getElementById('chkFecha').textContent = hoy.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // Cargar vehículo asignado
  if (typeof window.getVehiculoAsignado === 'function') {
    const veh = window.getVehiculoAsignado();
    if (veh) {
      document.getElementById('chkVehiculo').textContent = `${veh.placas} · ${veh.marca || ''} ${veh.modelo || ''}`;
    } else {
      document.getElementById('chkVehiculo').textContent = 'Sin vehículo asignado';
      document.getElementById('chkVehiculo').style.color = 'var(--red)';
    }
  }

  // Construir panels
  const container = document.getElementById('chkPanels');
  container.innerHTML = '';
  let totalItems = 0;

  Object.entries(CHECKLIST_ITEMS).forEach(([cat, items]) => {
    totalItems += items.length;
    const panel = document.createElement('div');
    panel.className = 'chk-panel';
    panel.innerHTML = `
      <div class="chk-panel-head">
        <span class="chk-panel-title"><i class="fas fa-clipboard-check"></i> ${cat}</span>
        <span class="chk-panel-badge">${items.length} puntos</span>
      </div>
      <div class="chk-grid">
        ${items.map(item => `
          <div class="chk-item" id="chk-${item.id}">
            <div class="chk-box" id="chkbox-${item.id}"><i class="fas fa-check" style="display:none"></i><i class="fas fa-times" style="display:none"></i></div>
            <div class="chk-label" style="flex:1">
              <div class="chk-label-text">${item.label}</div>
              <div class="chk-label-sub">${item.sub}</div>
              <div class="chk-obs-field"><textarea placeholder="Describa el problema…" id="chkobs-${item.id}"></textarea></div>
              <button class="chk-photo-btn" onclick="event.stopPropagation();tomarFotoChecklist('${item.id}')"><i class="fas fa-camera"></i> Adjuntar foto</button>
              <img id="chkimg-${item.id}" style="display:none;max-width:120px;border-radius:8px;margin-top:6px">
              <input type="file" accept="image/*" capture="environment" id="chkfile-${item.id}" style="display:none" onchange="previewFotoChecklist('${item.id}',this)">
            </div>
            <div class="chk-status-btns">
              <button class="chk-status-btn" onclick="event.stopPropagation();setCheckStatus('${item.id}','ok')">OK</button>
              <button class="chk-status-btn" onclick="event.stopPropagation();setCheckStatus('${item.id}','mal')">MAL</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(panel);
  });

  // Verificar si ya se hizo checklist hoy
  const todayKey = hoy.toISOString().slice(0, 10);
  const existente = localStorage.getItem(`prodeni_checklist_${todayKey}_${user.username}`);
  if (existente) {
    window.toast('Ya se registró un checklist hoy. Puede ver el historial.', 'info');
  }

  updateProgress();
}

window.setCheckStatus = function(id, status) {
  checklistState[id] = status;
  const item = document.getElementById('chk-' + id);
  const box = document.getElementById('chkbox-' + id);
  if (!item || !box) return;

  item.classList.remove('checked', 'failed');
  box.querySelectorAll('i').forEach(i => i.style.display = 'none');

  if (status === 'ok') {
    item.classList.add('checked');
    box.querySelector('.fa-check').style.display = 'block';
    // Reset status buttons
    item.querySelectorAll('.chk-status-btn').forEach(b => b.classList.remove('ok-active', 'mal-active'));
    item.querySelector('.chk-status-btn:first-child').classList.add('ok-active');
  } else {
    item.classList.add('failed');
    box.querySelector('.fa-times').style.display = 'block';
    item.querySelectorAll('.chk-status-btn').forEach(b => b.classList.remove('ok-active', 'mal-active'));
    item.querySelector('.chk-status-btn:last-child').classList.add('mal-active');
  }
  updateProgress();
};

function updateProgress() {
  const total = Object.values(CHECKLIST_ITEMS).reduce((s, items) => s + items.length, 0);
  const done = Object.keys(checklistState).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('chkProgressLabel').textContent = `${done} de ${total} verificados`;
  document.getElementById('chkProgressPct').textContent = `${pct}%`;
  document.getElementById('chkProgressBar').style.width = `${pct}%`;
}

window.tomarFotoChecklist = function(id) {
  document.getElementById('chkfile-' + id).click();
};

window.previewFotoChecklist = function(id, input) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('chkimg-' + id);
    img.src = e.target.result;
    img.style.display = 'block';
    checklistPhotos[id] = e.target.result;
  };
  reader.readAsDataURL(f);
};

window.guardarChecklist = function() {
  const user = window.currentUser || {};
  const km = document.getElementById('chkKm').value;
  if (!km) { window.toast('Ingrese el kilometraje actual', 'error'); return; }

  const total = Object.values(CHECKLIST_ITEMS).reduce((s, items) => s + items.length, 0);
  const done = Object.keys(checklistState).length;
  if (done < total) {
    if (!confirm(`Faltan ${total - done} puntos por verificar. ¿Desea guardar así?`)) return;
  }

  // Recopilar observaciones de items con falla
  const observaciones = {};
  Object.keys(checklistState).forEach(id => {
    if (checklistState[id] === 'mal') {
      const obs = document.getElementById('chkobs-' + id);
      observaciones[id] = obs ? obs.value : '';
    }
  });

  const veh = typeof window.getVehiculoAsignado === 'function' ? window.getVehiculoAsignado() : null;
  const todayKey = new Date().toISOString().slice(0, 10);
  const fallas = Object.values(checklistState).filter(s => s === 'mal').length;

  const registro = {
    action: 'saveChecklist',
    fecha: todayKey,
    hora: new Date().toLocaleTimeString('es-MX'),
    usuario: user.username || 'anonimo',
    placas: veh ? veh.placas : '',
    vehiculo: veh ? `${veh.marca} ${veh.modelo}` : '',
    km: km,
    estados: checklistState,
    observaciones: observaciones,
    fallas: fallas,
    totalItems: total,
    completados: done,
    timestamp: Date.now()
  };

  // Guardar localmente
  const key = `prodeni_checklist_${todayKey}_${user.username}`;
  localStorage.setItem(key, JSON.stringify(registro));

  // Guardar en historial
  const historial = JSON.parse(localStorage.getItem('prodeni_checklists_hist_' + (veh?.placas || 'general')) || '[]');
  historial.push(registro);
  localStorage.setItem('prodeni_checklists_hist_' + (veh?.placas || 'general'), JSON.stringify(historial));

  // Sincronizar con servidor
  if (navigator.onLine) {
    fetch(window.SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(registro)
    }).then(r => r.json()).then(d => {
      if (d.success) window.toast('Checklist sincronizado con la nube ✓', 'success');
    }).catch(() => {});
  }

  // Si hay fallas, generar alerta
  if (fallas > 0) {
    const alertas = JSON.parse(localStorage.getItem('prodeni_alertas') || '[]');
    alertas.push({
      tipo: 'checklist_falla',
      fecha: todayKey,
      hora: registro.hora,
      usuario: user.username,
      placas: veh?.placas || '',
      mensaje: `${fallas} punto(s) con falla en checklist diario`,
      observaciones: observaciones,
      leida: false,
      timestamp: Date.now()
    });
    localStorage.setItem('prodeni_alertas', JSON.stringify(alertas));
  }

  document.getElementById('chkSyncStatus').innerHTML = '<i class="fas fa-circle-check" style="color:var(--g3)"></i> Checklist firmado y guardado';
  window.toast(`Checklist completado: ${done}/${total} puntos, ${fallas} falla(s)`, fallas > 0 ? 'warn' : 'success');
};

window.verHistorialChecklist = function() {
  const panel = document.getElementById('chkHistorialPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'none') return;

  const veh = typeof window.getVehiculoAsignado === 'function' ? window.getVehiculoAsignado() : null;
  const hist = JSON.parse(localStorage.getItem('prodeni_checklists_hist_' + (veh?.placas || 'general')) || '[]');
  const list = document.getElementById('chkHistorialList');
  document.getElementById('chkHistCount').textContent = hist.length + ' registros';

  if (!hist.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text3);font-size:.82rem">Sin registros de checklist</div>';
    return;
  }

  list.innerHTML = [...hist].reverse().slice(0, 30).map(r => {
    const hasFallas = r.fallas > 0;
    return `<div class="chk-hist-row">
      <div class="chk-hist-dot ${hasFallas ? 'issues' : 'complete'}"></div>
      <div class="chk-hist-body">
        <div class="chk-hist-date">${r.fecha} · ${r.hora || ''}</div>
        <div class="chk-hist-sub">${r.usuario || '—'} · ${r.placas || '—'} · ${r.km || '—'} km · ${r.completados}/${r.totalItems} puntos</div>
      </div>
      <span class="chk-hist-badge ${hasFallas ? 'warn' : 'ok'}">${hasFallas ? r.fallas + ' falla(s)' : 'Todo OK'}</span>
    </div>`;
  }).join('');
};

// Inicializar
initChecklist();
})();
</script>
