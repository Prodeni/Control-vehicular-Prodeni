<!-- modules/mensajes.html -->
<style>
.msg-wrap{max-width:900px;margin:0 auto;display:flex;flex-direction:column;height:calc(100vh - var(--header-h) - 80px)}
.msg-header{margin-bottom:16px;flex-shrink:0}
.msg-header h2{font-size:1.4rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.msg-header h2 i{color:var(--g3)}
.msg-header p{font-size:.76rem;color:var(--text3);margin-top:3px}
.msg-layout{display:flex;gap:16px;flex:1;min-height:0}
@media(max-width:768px){.msg-layout{flex-direction:column}}
.msg-contacts{width:240px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow-y:auto;flex-shrink:0}
@media(max-width:768px){.msg-contacts{width:100%;max-height:180px}}
.msg-contacts-head{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);font-size:.75rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.msg-contacts-head i{color:var(--g2)}
.msg-contact{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.18s}
.msg-contact:last-child{border-bottom:none}
.msg-contact:hover{background:var(--g5)}
.msg-contact.active{background:linear-gradient(135deg,#E8F5E9,#C8E6C9)}
.msg-contact-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:white;flex-shrink:0}
.msg-contact-avatar.admin{background:linear-gradient(135deg,#F9A825,#E65100)}
.msg-contact-avatar.tecnico{background:linear-gradient(135deg,var(--g3),var(--g2))}
.msg-contact-info{flex:1;min-width:0}
.msg-contact-name{font-size:.82rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-contact-role{font-size:.68rem;color:var(--text3)}
.msg-contact-badge{width:8px;height:8px;border-radius:50%;background:var(--g3);flex-shrink:0;display:none}
.msg-contact.unread .msg-contact-badge{display:block}
.msg-chat{flex:1;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;min-height:0}
.msg-chat-head{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:10px;flex-shrink:0;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.msg-chat-head-name{font-size:.88rem;font-weight:700;color:var(--text)}
.msg-chat-head-status{font-size:.68rem;color:var(--text3)}
.msg-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.msg-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:.82rem}
.msg-empty i{font-size:2rem;opacity:.2;display:block;margin-bottom:10px}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:.82rem;line-height:1.5;position:relative;word-wrap:break-word}
.msg-bubble.sent{align-self:flex-end;background:linear-gradient(135deg,var(--g2),var(--g1));color:white;border-bottom-right-radius:4px}
.msg-bubble.received{align-self:flex-start;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-bubble-time{font-size:.6rem;opacity:.6;margin-top:4px;display:block}
.msg-bubble.sent .msg-bubble-time{text-align:right}
.msg-input-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.msg-input{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:40px;font-family:inherit;font-size:.85rem;outline:none;background:var(--bg);transition:.18s}
.msg-input:focus{border-color:var(--g3);background:var(--surface);box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.msg-send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g1));border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:.2s;flex-shrink:0;box-shadow:0 4px 12px rgba(46,125,50,.3)}
.msg-send-btn:hover{transform:scale(1.08);box-shadow:0 6px 16px rgba(46,125,50,.4)}
.msg-send-btn:active{transform:scale(.95)}
.msg-date-sep{text-align:center;font-size:.68rem;color:var(--text3);padding:8px 0;font-weight:600}
</style>

<div class="msg-wrap">
  <div class="msg-header">
    <h2><i class="fas fa-comment-dots"></i> Mensajes</h2>
    <p>Chat interno para comunicación con el equipo y administradores</p>
  </div>

  <div class="msg-layout">
    <div class="msg-contacts" id="msgContacts">
      <div class="msg-contacts-head"><i class="fas fa-users"></i> Contactos</div>
      <div style="padding:20px;text-align:center;color:var(--text3);font-size:.78rem"><i class="fas fa-spinner fa-spin"></i> Cargando…</div>
    </div>

    <div class="msg-chat" id="msgChat">
      <div class="msg-chat-head" id="msgChatHead">
        <div class="msg-contact-avatar admin" style="width:32px;height:32px;font-size:.7rem">?</div>
        <div>
          <div class="msg-chat-head-name">Seleccione un contacto</div>
          <div class="msg-chat-head-status">para iniciar conversación</div>
        </div>
      </div>
      <div class="msg-messages" id="msgMessages">
        <div class="msg-empty"><i class="fas fa-comments"></i><p>Seleccione un contacto de la lista para ver los mensajes</p></div>
      </div>
      <div class="msg-input-bar">
        <input type="text" class="msg-input" id="msgInput" placeholder="Escriba un mensaje…" disabled onkeypress="if(event.key==='Enter')enviarMensaje()">
        <button class="msg-send-btn" onclick="enviarMensaje()" id="msgSendBtn" disabled><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
let contactos = [];
let chatActivo = null;
const miUser = (window.currentUser || {}).username || 'anonimo';

function initMensajes() {
  cargarContactos();
}

function cargarContactos() {
  const cache = localStorage.getItem('prodeni_usuarios_cache');
  if (cache) {
    contactos = JSON.parse(cache).filter(u => u.username !== miUser);
  }
  // Siempre incluir "Administrador General" como canal
  const tieneAdmin = contactos.some(u => u.role === 'admin');
  if (!tieneAdmin && (window.currentUser || {}).role !== 'admin') {
    contactos.unshift({ username: 'admin', role: 'admin', email: '' });
  }

  renderContactos();
}

function renderContactos() {
  const el = document.getElementById('msgContacts');
  el.innerHTML = `<div class="msg-contacts-head"><i class="fas fa-users"></i> Contactos (${contactos.length})</div>`;

  if (!contactos.length) {
    el.innerHTML += '<div style="padding:20px;text-align:center;color:var(--text3);font-size:.78rem">No hay contactos</div>';
    return;
  }

  contactos.forEach(u => {
    const isAdmin = u.role === 'admin';
    const ini = (u.username || '?')[0].toUpperCase();
    const chatKey = getChatKey(u.username);
    const msgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
    const lastMsg = msgs.length ? msgs[msgs.length - 1] : null;
    const hasUnread = lastMsg && lastMsg.from !== miUser && !lastMsg.leido;

    const div = document.createElement('div');
    div.className = `msg-contact${chatActivo === u.username ? ' active' : ''}${hasUnread ? ' unread' : ''}`;
    div.onclick = () => abrirChat(u.username);
    div.innerHTML = `
      <div class="msg-contact-avatar ${isAdmin ? 'admin' : 'tecnico'}">${ini}</div>
      <div class="msg-contact-info">
        <div class="msg-contact-name">${u.username}</div>
        <div class="msg-contact-role">${isAdmin ? 'Administrador' : 'Técnico'}</div>
      </div>
      <div class="msg-contact-badge"></div>
    `;
    el.appendChild(div);
  });
}

function getChatKey(otherUser) {
  const sorted = [miUser, otherUser].sort();
  return `prodeni_chat_${sorted[0]}_${sorted[1]}`;
}

function abrirChat(username) {
  chatActivo = username;
  const contacto = contactos.find(u => u.username === username) || { username, role: 'tecnico' };
  const isAdmin = contacto.role === 'admin';
  const ini = (username || '?')[0].toUpperCase();

  // Header
  document.getElementById('msgChatHead').innerHTML = `
    <div class="msg-contact-avatar ${isAdmin ? 'admin' : 'tecnico'}" style="width:32px;height:32px;font-size:.7rem">${ini}</div>
    <div>
      <div class="msg-chat-head-name">${username}</div>
      <div class="msg-chat-head-status">${isAdmin ? 'Administrador' : 'Técnico de campo'}</div>
    </div>
  `;

  // Habilitar input
  document.getElementById('msgInput').disabled = false;
  document.getElementById('msgSendBtn').disabled = false;
  document.getElementById('msgInput').focus();

  // Cargar mensajes
  renderMensajes();
  renderContactos();

  // Marcar como leídos
  const chatKey = getChatKey(username);
  const msgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
  msgs.forEach(m => { if (m.from !== miUser) m.leido = true; });
  localStorage.setItem(chatKey, JSON.stringify(msgs));
}

function renderMensajes() {
  if (!chatActivo) return;
  const chatKey = getChatKey(chatActivo);
  const msgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
  const container = document.getElementById('msgMessages');

  if (!msgs.length) {
    container.innerHTML = `<div class="msg-empty"><i class="fas fa-comments"></i><p>No hay mensajes aún. Envíe el primero.</p></div>`;
    return;
  }

  let html = '';
  let lastDate = '';
  msgs.forEach(m => {
    const msgDate = m.fecha || '';
    if (msgDate !== lastDate) {
      html += `<div class="msg-date-sep">${msgDate}</div>`;
      lastDate = msgDate;
    }
    const isMine = m.from === miUser;
    html += `<div class="msg-bubble ${isMine ? 'sent' : 'received'}">
      ${m.texto}
      <span class="msg-bubble-time">${m.hora || ''}</span>
    </div>`;
  });

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

window.enviarMensaje = function() {
  if (!chatActivo) return;
  const input = document.getElementById('msgInput');
  const texto = input.value.trim();
  if (!texto) return;

  const ahora = new Date();
  const msg = {
    from: miUser,
    to: chatActivo,
    texto: texto,
    fecha: ahora.toISOString().slice(0, 10),
    hora: ahora.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }),
    leido: false,
    timestamp: Date.now()
  };

  const chatKey = getChatKey(chatActivo);
  const msgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
  msgs.push(msg);
  localStorage.setItem(chatKey, JSON.stringify(msgs));

  // Sincronizar con servidor
  if (navigator.onLine) {
    fetch(window.SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'saveMessage', ...msg })
    }).catch(() => {});
  }

  input.value = '';
  renderMensajes();
  renderContactos();
};

// Inicializar
initMensajes();
})();
</script>
